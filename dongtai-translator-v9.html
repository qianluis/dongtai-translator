<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>东台方言翻译</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif;
            background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#333}
        .c{max-width:520px;margin:0 auto;padding:12px;padding-bottom:80px}
        .h{text-align:center;padding:12px 0 6px}
        .h h1{font-size:24px;background:linear-gradient(135deg,#f5af19,#f12711);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .h p{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
        .cd{background:#fff;border-radius:20px;padding:16px;margin:10px 0;box-shadow:0 8px 24px rgba(0,0,0,.2)}
        .mr{display:flex;gap:8px;margin-bottom:10px}
        .mb{flex:1;padding:10px;border-radius:12px;border:2px solid #eee;background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
        .mb.a{border-color:#f5af19;background:linear-gradient(135deg,#f5af19,#f12711);color:#fff}
        .iw{position:relative;margin-bottom:8px}
        .ib{width:100%;min-height:70px;padding:12px 50px 12px 12px;border:2px solid #eee;border-radius:14px;font-size:17px;line-height:1.5;resize:none;font-family:inherit}
        .ib:focus{outline:none;border-color:#f5af19}
        .ib::placeholder{color:#bbb;font-size:14px}
        .vb{position:absolute;right:8px;bottom:8px;width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,#f5af19,#f12711);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .vb.r{background:#e91e63;animation:p 1s infinite}
        @keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        .tb{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f5af19,#f12711);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
        .tb:active{transform:scale(.98)}
        .sb{background:#e8f5e9;border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:12px;color:#2e7d32}
        .sd{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:4px}
        .sd.err{background:#f44336}
        .sd.warn{background:#ff9800}
        .hb{background:#fff3e0;border-radius:10px;padding:8px 10px;margin-bottom:8px;font-size:12px;color:#e65100;line-height:1.5}
        .rb{background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:14px;padding:14px;margin-top:10px;border-left:4px solid #f5af19;animation:si .3s}
        @keyframes si{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .rl{font-size:11px;color:#999;margin-bottom:3px}
        .rt{font-size:20px;color:#1a1a2e;font-weight:600;line-height:1.5}
        .rd{font-size:18px;color:#e65100;margin-top:6px;font-weight:500}
        .rm{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
        .mt{font-size:11px;padding:3px 8px;background:rgba(245,175,25,.15);color:#e65100;border-radius:8px}
        .ra{display:flex;gap:6px;margin-top:10px}
        .ab{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-weight:600}
        .ab.p{background:#f5af19;color:#fff}
        .ab.p:active{transform:scale(.97)}
        .ab.s{background:#f0f0f0;color:#666}
        .ab.p.playing{background:#4caf50}
        .qt{font-size:12px;color:#999;margin:10px 0 6px}
        .qg{display:flex;flex-wrap:wrap;gap:6px}
        .qc{padding:5px 12px;background:#f5f5f5;border-radius:14px;font-size:12px;cursor:pointer;border:none}
        .qc:active{background:#f5af19;color:#fff}
        .tt{display:flex;gap:6px;margin:8px 0}
        .ttb{flex:1;padding:8px;border-radius:10px;border:none;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:13px;font-weight:600;cursor:pointer}
        .ttb.a{background:#fff;color:#e65100}
        .ds{margin-bottom:12px}
        .dt{font-size:14px;font-weight:600;margin-bottom:6px;color:#e65100}
        .dtb{width:100%;font-size:13px}
        .dtb td{padding:3px 6px}
        .dtb td:first-child{color:#e65100;font-weight:500;white-space:nowrap}
        .dtb td:last-child{color:#666}
        .hi{padding:10px 0;border-bottom:1px solid #f0f0f0}
        .hi:last-child{border:none}
        .ht{font-size:11px;color:#bbb}
        .hp{font-size:13px;margin-top:3px}
        .hp .ar{color:#f5af19;margin:0 4px}
        .hidden{display:none!important}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:1000}
    </style>
</head>
<body>
<div class="c">
    <div class="h"><h1>🗣️ 东台方言翻译</h1><p>普通话↔东台话 · 点击🔊朗读</p></div>
    <div class="tt">
        <button class="ttb a" onclick="stab('t')">🔄 翻译</button>
        <button class="ttb" onclick="stab('d')">📖 词典</button>
        <button class="ttb" onclick="stab('h')">📜 历史</button>
    </div>
    <div id="pt">
        <div class="cd">
            <div class="sb" id="sb"><span class="sd" id="sd"></span><span id="st">准备就绪</span></div>
            <div class="mr">
                <button class="mb a" id="mm" onclick="sm('m2d')">普通话 → 东台话</button>
                <button class="mb" id="md" onclick="sm('d2m')">东台话 → 普通话</button>
            </div>
            <div class="hb" id="hb">💡 点<b>🎤</b>说普通话→自动翻译。翻译后点<b>🔊朗读</b>听声音。</div>
            <div class="iw">
                <textarea class="ib" id="inp" placeholder="输入普通话，如：你去哪里？" oninput="oi()"></textarea>
                <button class="vb" id="vbtn" onclick="tv()">🎤</button>
            </div>
            <button class="tb" onclick="dt()">🔄 翻译</button>
            <div id="ra"></div>
            <div class="qt">💡 常用短句</div>
            <div class="qg" id="qg"></div>
        </div>
    </div>
    <div id="pd" class="hidden"><div class="cd" id="dc"></div></div>
    <div id="ph" class="hidden"><div class="cd"><h3 style="margin-bottom:10px">📜 历史</h3><div id="hl"><p style="color:#999;text-align:center;padding:20px">暂无</p></div></div></div>
</div>
<script>
// ============================================================
// 东台方言翻译 v9 - 彻底修复TTS无声问题
// 核心修复：Chrome移动端需要用户手势触发TTS
// → 翻译后不自动朗读，改由用户点击🔊按钮朗读
// → 添加voice预热+重试+详细错误提示
// ============================================================
const S={mode:'m2d',rec:false,recog:null,voice:null,voiceReady:false,history:JSON.parse(localStorage.getItem('dt_h')||'[]')};

// ===== 150+ 词汇映射 =====
const M2D={'不知道':'弗晓得','多少钱':'几钿','什么时候':'什的时辰','聊天':'讲白相','吵架':'相骂','回家':'家去','洗澡':'汏浴','舒服':'适意','着急':'心焦','厉害':'来斯','东西':'杲昃','晚饭':'夜饭','午饭':'中饭','鸡蛋':'鸡子','我们':'我俦','你们':'你俦','他们':'他俦','她们':'他俦','哪里':'哪块','什么':'什的','怎么':'怎呃','爷爷':'爹爹','孩子':'伢儿','妻子':'女将','丈夫':'男将','老师':'先生','邻居':'邻舍','老人':'老人家','不好':'弗好','不行':'弗行','不会':'弗会','不能':'弗能','不是':'弗是','不要':'弗要','不用':'弗用','不要紧':'呒得事','没关系':'呒得事','今天':'今呃','明天':'明呃','昨天':'昨呃','后天':'后呃','前天':'前呃','早上':'早起头','中午':'中上','下午':'下半日','晚上':'夜头','现在':'眼下','以前':'老早','刚才':'才将','以后':'往后','每天':'日日','睡觉':'困觉','差':'推板','利索':'刷刮','实在':'扎实','聪明':'灵光','笨':'木作','漂亮':'标致','干净':'清爽','脏':'龌龊','上面':'高头','下面':'底下','里面':'里头','外面':'外头','前面':'前头','后面':'后头','对面':'对过','旁边':'边头','找':'寻','洗':'汏','穿':'着','看':'望','说':'讲','跑':'奔','站':'立','蹲':'跍','扔':'掼','拿':'担','放':'搁','藏':'囥','玩':'耍','给':'把','很':'蛮','非常':'蛮','太':'蛮','没有':'呒得','不':'弗'};
const D2M={};for(const[m,d]of Object.entries(M2D))if(d!==m&&!D2M[d])D2M[d]=m;
Object.assign(D2M,{'弗':'不','呒得':'没有','哪块':'哪里','什的':'什么','怎呃':'怎么','几钿':'多少钱','杲昃':'东西','来斯':'厉害','推板':'差','扎实':'实在','刷刮':'利索','家去':'回家','我俦':'我们','你俦':'你们','他俦':'他们','爹爹':'爷爷','伢儿':'孩子','女将':'妻子','先生':'老师','邻舍':'邻居','汏':'洗','着':'穿','望':'看','寻':'找','讲':'说','奔':'跑','立':'站','蛮':'很','呃':'了','今呃':'今天','明呃':'明天','昨呃':'昨天','早起头':'早上','中上':'中午','夜头':'晚上','眼下':'现在','老早':'以前','日日':'每天','鸡子':'鸡蛋','困觉':'睡觉','讲白相':'聊天','适意':'舒服','心焦':'着急','相骂':'吵架','清爽':'干净','龌龊':'脏','灵光':'聪明','标致':'漂亮','木作':'笨','夜饭':'晚饭','中饭':'午饭'});

// ===== 方言语音纠错 =====
const SF={'什地':'什的','神的':'什的','甚的':'什的','十地':'什的','哪快':'哪块','那块':'哪块','拉块':'哪块','几点':'几钿','几钱':'几钿','几店':'几钿','搞子':'杲昃','高子':'杲昃','稿子':'杲昃','来死':'来斯','来四':'来斯','赖斯':'来斯','腿板':'推板','退板':'推板','我仇':'我俦','我凑':'我俦','我愁':'我俦','我抽':'我俦','你仇':'你俦','你凑':'你俦','你抽':'你俦','他仇':'他俦','他凑':'他俦','他抽':'他俦','迭迭':'爹爹','跌跌':'爹爹','牙儿':'伢儿','亚儿':'伢儿','牙人':'伢儿','大雨':'汏浴','大浴':'汏浴','下去':'家去','架去':'家去','木得':'呒得','没得':'呒得','么得':'呒得','今儿':'今呃','金额':'今呃','明儿':'明呃','名额':'明呃','昨儿':'昨呃','做额':'昨呃'};

// ===== 翻译引擎 =====
function tr(text){
    text=text.trim();if(!text)return null;
    const isM2D=S.mode==='m2d';const wm=isM2D?M2D:D2M;
    let r=text;const es=Object.entries(wm).sort((a,b)=>b[0].length-a[0].length);
    for(const[f,t]of es)if(r.includes(f))r=r.split(f).join(t);
    if(isM2D){r=r.replace(/呃{2,}/g,'呃').replace(/了吗/g,'呃没').replace(/了。/g,'呃。').replace(/了！/g,'呃！').replace(/了？/g,'呃？');}
    const c=r!==text;return{o:text,t:r,ok:c};
}

// ===== TTS语音播报 - 彻底修复版 =====
// 关键：Chrome移动端TTS必须由用户手势触发！
// 所以不能自动朗读，必须用户点击🔊按钮

function initVoices(){
    if(!('speechSynthesis' in window)){
        ss('⚠️ 浏览器不支持语音合成','err');return;
    }
    // 尝试获取中文语音
    function findZh(voices){
        for(const v of voices){if(v.lang==='zh-CN')return v;}
        for(const v of voices){if(v.lang.startsWith('zh'))return v;}
        for(const v of voices){if(v.name&&v.name.includes('Chinese'))return v;}
        return null;
    }
    function tryLoad(){
        const voices=speechSynthesis.getVoices();
        if(voices.length>0){
            S.voice=findZh(voices);
            S.voiceReady=true;
            if(S.voice){
                ss('✅ 语音就绪（'+S.voice.name.substring(0,15)+'）');
                console.log('TTS voice:',S.voice.name,S.voice.lang);
            }else{
                ss('⚠️ 未找到中文语音，朗读可能用默认声音','warn');
            }
        }
    }
    // 立即尝试
    tryLoad();
    // 也监听异步加载
    speechSynthesis.onvoiceschanged=tryLoad;
    // 兜底：延迟再试
    setTimeout(tryLoad,500);
    setTimeout(tryLoad,2000);
}

// 全局：记住最后一次翻译结果，给🔊按钮用
let lastTranslated='';

function speak(text){
    if(!text)return;
    if(!('speechSynthesis' in window)){
        showToast('浏览器不支持语音');return;
    }
    // 取消之前的播报
    speechSynthesis.cancel();
    
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';
    u.rate=0.85;
    u.pitch=1.0;
    u.volume=1.0;
    
    // 选择中文语音
    if(S.voice){
        u.voice=S.voice;
    }
    
    // 播报状态
    ss('🔊 播报中...');
    const btn=document.querySelector('.ab.p.playing');
    
    u.onend=()=>{
        ss('播报完成');
        document.querySelectorAll('.ab.p.playing').forEach(b=>b.classList.remove('playing'));
    };
    u.onerror=(e)=>{
        console.error('TTS error:',e);
        ss('❌ 播报失败: '+e.error,'err');
        document.querySelectorAll('.ab.p.playing').forEach(b=>b.classList.remove('playing'));
        
        // 降级方案：不选voice再试
        if(u.voice){
            const u2=new SpeechSynthesisUtterance(text);
            u2.lang='zh-CN';u2.rate=0.85;
            u2.onend=()=>ss('播报完成（降级模式）');
            u2.onerror=()=>ss('❌ 降级播报也失败','err');
            try{speechSynthesis.speak(u2);}catch(e2){ss('❌ TTS不可用','err');}
        }
    };
    
    try{
        speechSynthesis.speak(u);
    }catch(e){
        ss('❌ TTS异常: '+e.message,'err');
    }
}

// ===== 语音识别 =====
function initRec(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ss('⚠️ 不支持语音识别，请用Chrome');return;}
    S.recog=new SR();
    S.recog.continuous=false;S.recog.interimResults=true;S.recog.lang='zh-CN';S.recog.maxAlternatives=5;
    S.recog.onstart=()=>{S.rec=true;document.getElementById('vbtn').classList.add('r');document.getElementById('vbtn').textContent='⏹';ss('🎙️ 请说话...');};
    S.recog.onresult=(e)=>{
        let best='',bs=-1;
        for(let i=e.resultIndex;i<e.results.length;i++){
            for(let j=0;j<e.results[i].length;j++){
                let t=e.results[i][j].transcript.trim();const c=e.results[i][j].confidence||.5;
                let fix=t,fc=0;
                for(const[w,r]of Object.entries(SF))if(fix.includes(w)){fix=fix.replace(new RegExp(w,'g'),r);fc++;}
                const sc=c+fc*.15;
                if(sc>bs){best=fix;bs=sc;}
            }
        }
        if(best){document.getElementById('inp').value=best;ss('识别: '+best);}
        if(e.results[e.results.length-1].isFinal){sv();if(best)setTimeout(dt,50);}
    };
    S.recog.onerror=(e)=>{
        sv();
        if(e.error==='not-allowed')ss('❌ 麦克风被拒绝','err');
        else if(e.error==='no-speech')ss('未检测到语音');
        else if(e.error!=='aborted')ss('语音错误: '+e.error,'warn');
    };
    S.recog.onend=()=>sv();
}
function tv(){
    if(S.rec){sv();return;}
    if(!S.recog)initRec();
    if(!S.recog){showToast('请用Chrome浏览器');return;}
    try{S.recog.start();}catch(e){if(e.name!=='InvalidStateError')showToast('启动失败');}
}
function sv(){S.rec=false;const b=document.getElementById('vbtn');b.classList.remove('r');b.textContent='🎤';if(S.recog)try{S.recog.stop();}catch(e){}}

// ===== UI =====
function sm(m){
    S.mode=m;
    document.getElementById('mm').classList.toggle('a',m==='m2d');
    document.getElementById('md').classList.toggle('a',m==='d2m');
    document.getElementById('inp').placeholder=m==='m2d'?'输入普通话，如：你去哪里？':'输入东台话，如：你上哪块去呃？';
    document.getElementById('inp').value='';document.getElementById('ra').innerHTML='';
    document.getElementById('hb').innerHTML=m==='m2d'?'💡 点<b>🎤</b>说普通话→自动翻译。翻译后点<b>🔊朗读</b>听声音。':'💡 东台话建议<b>文字输入</b>。语音说方言会纠错但不保证准确。';
    iq();
}
function stab(t){
    document.querySelectorAll('.ttb').forEach(b=>b.classList.remove('a'));event.target.classList.add('a');
    document.getElementById('pt').classList.toggle('hidden',t!=='t');
    document.getElementById('pd').classList.toggle('hidden',t!=='d');
    document.getElementById('ph').classList.toggle('hidden',t!=='h');
    if(t==='d')rd();if(t==='h')rh();
}
let tmr=null;
function oi(){clearTimeout(tmr);tmr=setTimeout(()=>{if(document.getElementById('inp').value.trim().length>=2)dt();},300);}

function dt(){
    const text=document.getElementById('inp').value.trim();if(!text)return;
    const r=tr(text);if(!r)return;
    lastTranslated=r.t;
    const ok=r.ok;
    document.getElementById('ra').innerHTML=`
        <div class="rb">
            <div class="rl">${S.mode==='m2d'?'普通话':'东台话'}</div>
            <div class="rt">${esc(r.o)}</div>
            <div class="rl" style="margin-top:8px">${S.mode==='m2d'?'🗣️ 东台话':'🇨🇳 普通话'}</div>
            <div class="rd">${esc(r.t)}</div>
            <div class="rm"><span class="mt">${ok?'✅ 翻译完成':'⚠️ 仅供参考'}</span></div>
            <div class="ra">
                <button class="ab p" onclick="speakBtn()">🔊 朗读翻译</button>
                <button class="ab s" onclick="speak('${esc(r.o).replace(/'/g,"\\'")}')">🔊 原文</button>
                <button class="ab s" onclick="cp('${esc(r.t).replace(/'/g,"\\'")}')">📋</button>
            </div>
        </div>`;
    ss(ok?'✅ 翻译完成':'翻译完成（低置信度）');
    S.history.unshift({t:new Date().toLocaleString('zh-CN'),o:r.o,r:r.t,m:S.mode});
    if(S.history.length>50)S.history.length=50;
    localStorage.setItem('dt_h',JSON.stringify(S.history));
}

// 🔊按钮 - 由用户手势触发TTS（Chrome移动端必须！）
function speakBtn(){
    if(!lastTranslated){showToast('请先翻译');return;}
    // 标记正在播放
    document.querySelectorAll('.ab.p').forEach(b=>b.classList.add('playing'));
    speak(lastTranslated);
}

function ss(t,c){
    document.getElementById('st').textContent=t;
    const d=document.getElementById('sd');
    d.className='sd'+(c==='err'?' err':c==='warn'?' warn':'');
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function cp(t){navigator.clipboard.writeText(t).then(()=>showToast('已复制')).catch(()=>{const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);showToast('已复制');});}

const QM=["你好","吃饭了吗","你去哪里","今天吃什么","多少钱","太贵了","便宜点","回家了","不知道","很厉害"];
const QD=["你好呃","饭吃呃没","你上哪块去呃","今呃吃什的呃","几钿呃","蛮贵呃","便宜点呃","家去呃","弗晓得","蛮来斯呃"];
function iq(){const p=S.mode==='m2d'?QM:QD;document.getElementById('qg').innerHTML=p.map(q=>`<button class="qc" onclick="uq('${q}')">${q}</button>`).join('');}
function uq(t){document.getElementById('inp').value=t;dt();}

const DC=[{c:'否定',i:[['弗','不'],['呒得','没有'],['覅','不要']]},{c:'疑问',i:[['哪块','哪里'],['什的','什么'],['怎呃','怎么'],['几钿','多少钱'],['什的时辰','什么时候']]},{c:'特色',i:[['杲昃','东西'],['来斯','厉害'],['推板','差'],['扎实','实在'],['刷刮','利索'],['适意','舒服'],['心焦','着急']]},{c:'称谓',i:[['爹爹','爷爷'],['伢儿','孩子'],['女将','妻子'],['男将','丈夫'],['先生','老师'],['邻舍','邻居']]},{c:'代词',i:[['我俦','我们'],['你俦','你们'],['他俦','他们']]},{c:'时间',i:[['今呃','今天'],['明呃','明天'],['昨呃','昨天'],['早起头','早上'],['中上','中午'],['夜头','晚上'],['眼下','现在'],['日日','每天']]},{c:'动词',i:[['汏','洗'],['着','穿'],['望','看'],['寻','找'],['讲','说'],['奔','跑'],['立','站'],['困觉','睡觉'],['家去','回家'],['讲白相','聊天']]},{c:'形容词',i:[['蛮','很'],['灵光','聪明'],['木作','笨'],['标致','漂亮'],['清爽','干净'],['龌龊','脏']]}];
function rd(){document.getElementById('dc').innerHTML=DC.map(g=>`<div class="ds"><div class="dt">${g.c}</div><table class="dtb">${g.i.map(([d,m])=>`<tr><td>${d}</td><td>${m}</td></tr>`).join('')}</table></div>`).join('');}

function rh(){const e=document.getElementById('hl');if(!S.history.length){e.innerHTML='<p style="color:#999;text-align:center;padding:20px">暂无</p>';return;}
e.innerHTML=S.history.map(h=>`<div class="hi"><div class="ht">${h.t}</div><div class="hp">${h.o} <span class="ar">→</span> ${h.r}</div></div>`).join('');}

function showToast(m){const o=document.querySelector('.toast');if(o)o.remove();const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

document.addEventListener('DOMContentLoaded',()=>{iq();initVoices();initRec();});
</script>
</body>
