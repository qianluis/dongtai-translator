<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>东台方言翻译器 v9 | 语音纠错+实时翻译+TTS朗读</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0c29;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--accent:#feca57;--accent2:#ff6b6b;--accent3:#48dbfb;--text:#e8e8e8;--muted:#8899aa;--success:#00d2d3;--warn:#f368e0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,var(--bg) 0%,#302b63 50%,#24243e 100%);min-height:100vh;color:var(--text)}
.container{max-width:900px;margin:0 auto;padding:12px}
header{text-align:center;padding:16px 0 8px}
header h1{font-size:1.6em;background:linear-gradient(90deg,var(--accent2),var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
header .subtitle{color:var(--muted);font-size:0.82em;margin-top:4px}
.stats-bar{display:flex;justify-content:center;gap:8px;margin:8px 0;flex-wrap:wrap}
.stat-pill{background:var(--card);border-radius:16px;padding:4px 12px;font-size:0.78em;border:1px solid var(--border)}
.stat-pill b{color:var(--accent)}
.tab-bar{display:flex;justify-content:center;gap:6px;margin:10px 0 8px}
.tab{padding:6px 16px;border-radius:16px;cursor:pointer;background:var(--card);border:1px solid var(--border);font-size:0.85em;transition:all .3s}
.tab:hover,.tab.active{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#1a1a2e;border-color:transparent;font-weight:600}
.panel{display:none}.panel.active{display:block}
.card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:10px;backdrop-filter:blur(6px)}
.card h3{margin-bottom:8px;color:var(--accent);font-size:0.95em;display:flex;align-items:center;gap:6px}
textarea{width:100%;height:100px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:1em;resize:vertical;font-family:inherit;line-height:1.6}
textarea:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 10px rgba(255,107,107,0.2)}
.btn-row{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:0.85em;cursor:pointer;transition:all .2s;font-weight:500}
.btn-primary{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#1a1a2e}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(255,107,107,0.3)}
.btn-secondary{background:rgba(255,255,255,0.1);color:var(--text);border:1px solid var(--border)}
.btn-voice{background:linear-gradient(90deg,var(--accent3),#0abde3);color:#1a1a2e}
.btn-voice.recording{animation:pulse 1s infinite;background:linear-gradient(90deg,#ff6b6b,#ee5a24)}
.btn-speak{background:linear-gradient(90deg,var(--success),#01a3a4);color:#1a1a2e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.result-area{min-height:60px;background:rgba(0,0,0,0.25);border-radius:10px;padding:12px;line-height:1.8;font-size:1.05em;border:1px solid rgba(255,255,255,0.08);white-space:pre-wrap}
.highlight{color:var(--accent);font-weight:600}
.corrected{color:var(--success);font-size:0.85em}
.direction-tag{display:inline-block;background:rgba(254,202,87,0.15);color:var(--accent);padding:2px 10px;border-radius:10px;font-size:0.78em;margin:4px 0}
.voice-panel{text-align:center;padding:20px}
.mic-btn{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),#0abde3);display:inline-flex;align-items:center;justify-content:center;font-size:48px;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(72,219,251,0.3);border:none;color:#1a1a2e}
.mic-btn.recording{background:linear-gradient(135deg,#ff6b6b,#ee5a24);box-shadow:0 4px 20px rgba(255,107,107,0.4);transform:scale(1.05);animation:pulse 1s infinite}
.mic-btn:hover{transform:scale(1.05)}
.voice-wave{display:inline-block;width:6px;height:6px;background:var(--accent2);border-radius:50%;margin:0 2px;animation:wave 0.6s infinite}
.voice-wave:nth-child(2){animation-delay:0.15s}
.voice-wave:nth-child(3){animation-delay:0.3s}
.voice-wave:nth-child(4){animation-delay:0.45s}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.5)}}
.voice-status{margin:12px 0;color:var(--accent3);font-size:0.9em;display:none}
.voice-status.active{display:block}
.voice-result{text-align:left;margin-top:16px}
.quick-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.quick-item{background:rgba(255,255,255,0.08);color:var(--text);padding:6px 14px;border-radius:16px;font-size:0.82em;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.quick-item:hover{background:rgba(254,202,87,0.15);border-color:var(--accent)}
.footer{text-align:center;padding:16px 0;color:var(--muted);font-size:0.75em}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>🗣️ 东台方言翻译器</h1>
  <div class="subtitle">江淮官话泰如片 · 语音纠错+实时翻译+TTS朗读 · 400K语料库</div>
</header>

<div class="stats-bar">
  <div class="stat-pill">📊 400K语料</div>
  <div class="stat-pill">🎯 100%强方言</div>
  <div class="stat-pill">🔧 120+规则</div>
  <div class="stat-pill">🎤 ASR纠错</div>
  <div class="stat-pill">🔊 TTS朗读</div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('text')">📝 文字翻译</div>
  <div class="tab" onclick="switchTab('voice')">🎤 语音翻译</div>
  <div class="tab" onclick="switchTab('browse')">📚 语料浏览</div>
</div>

<!-- 文字翻译面板 -->
<div id="panel-text" class="panel active">
<div class="card">
  <h3>📝 文字翻译</h3>
  <textarea id="inputText" placeholder="输入普通话或东台方言，自动识别方向..." oninput="autoTranslate()"></textarea>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="doTranslate()">翻译</button>
    <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    <button class="btn btn-speak" onclick="speakText('inputText')">🔊 朗读原文</button>
  </div>
  <div id="directionInfo" class="direction-tag" style="display:none"></div>
  <div id="asrInfo" class="corrected" style="display:none"></div>
  <div id="resultArea" class="result-area" data-empty="翻译结果将显示在这里" style="margin-top:8px">翻译结果将显示在这里</div>
  <div class="btn-row">
    <button class="btn btn-speak" onclick="speakText('resultArea')">🔊 朗读译文</button>
    <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
  </div>
</div>

<div class="card">
  <h3>💬 常用短语（点击翻译）</h3>
  <div class="quick-grid" id="quickPhrases"></div>
</div>
</div>

<!-- 语音翻译面板 -->
<div id="panel-voice" class="panel">
<div class="card">
  <div class="voice-panel">
    <h3>🎤 语音翻译</h3>
    <p style="color:var(--muted);font-size:0.85em;margin:8px 0">说普通话或东台话，自动识别+纠错+翻译+朗读</p>
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
    <div class="voice-status" id="voiceStatus">
      <span class="voice-wave"></span><span class="voice-wave"></span><span class="voice-wave"></span><span class="voice-wave"></span>
      <span style="margin-left:8px">正在聆听...</span>
    </div>
  </div>
  <div id="voiceResultArea" style="display:none">
    <div class="card" style="border-left:3px solid var(--accent3)">
      <h3>🔍 语音识别</h3>
      <div id="voiceASR" class="result-area"></div>
    </div>
    <div class="card" id="voiceCorrectedCard" style="border-left:3px solid var(--success);display:none">
      <h3>✅ ASR纠错</h3>
      <div id="voiceCorrected" class="result-area"></div>
    </div>
    <div class="card" style="border-left:3px solid var(--accent)">
      <h3>📝 翻译结果</h3>
      <div id="voiceTranslated" class="result-area"></div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn btn-speak" onclick="speakText('voiceTranslated')">🔊 朗读</button>
        <button class="btn btn-secondary" onclick="copyEl('voiceTranslated')">📋 复制</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- 语料浏览面板 -->
<div id="panel-browse" class="panel">
<div class="card">
  <h3>📚 方言语料浏览</h3>
  <div class="quick-grid" id="categoryGrid"></div>
  <div id="corpusDisplay" style="margin-top:12px"></div>
</div>
</div>

<div class="footer">东台方言翻译器 v9 · 语音纠错+实时翻译+TTS朗读 · <a href="https://github.com/qianluis/dongtai-translator" style="color:var(--accent3)">GitHub</a></div>
</div>

<script>
// ============ 语音识别纠错层 ============
const ASR_FIX = [
  ['我拉','我俫'],['我啦','我俫'],['我俩','我俫'],['我勒','我俫'],
  ['你拉','你俫'],['你啦','你俫'],['你俩','你俫'],['你勒','你俫'],
  ['他拉','他俫'],['他啦','他俫'],['他俩','他俫'],['他勒','他俫'],
  ['十的','什的'],['什地','什的'],['什尼','什的'],
  ['怎样','怎呃'],['怎的','怎呃'],['怎呢','怎呃'],['真呢','怎呃'],['争呢','怎呃'],
  ['几点','几钿'],['几钱','几钿'],['几店','几钿'],['做什地','做什的'],
  ['今早','今朝'],['金朝','今朝'],['今招','今朝'],['明早','明朝'],['名招','明朝'],
  ['后高','侯告'],['厚稿','侯告'],['候告','侯告'],['猴搞','侯告'],['号搞','侯告'],['后搞','侯告'],
  ['中周','中昼'],['种周','中昼'],['上周','上昼'],['商周','上昼'],['下周','下昼'],
  ['个歇','搿歇'],['格歇','搿歇'],['各歇','搿歇'],['克克','刻刻'],['可克','刻刻'],
  ['没的','没得'],['美的','没得'],['梅的','没得'],['美的','没得'],
  ['不来事','勿来事'],['不来是','勿来事'],['不晓得','勿晓得'],['不晓的','勿晓得'],
  ['跌跌','嗲嗲'],['玛玛','嫲嫲'],['嬷嬷','嫲嫲'],['男酱','男将'],['南将','男将'],
  ['女酱','女将'],['吕将','女将'],['歌歌','锅锅'],['佳佳','假假'],['小南','小囡'],
  ['结滚','结棍'],['解棍','结棍'],['杰棍','结棍'],['饭嫌','犯嫌'],['凡嫌','犯嫌'],
  ['零光','灵光'],['林光','灵光'],['表致','标致'],['小的','晓得'],['晓的','晓得'],['效得','晓得'],
  ['惯了','掼咧'],['关了','掼咧'],['抗了','囥咧'],['炕了','囥咧'],['挖了','搲咧'],
  ['邦衬','帮衬'],['号稍','豪稍'],['好稍','豪稍'],['毫稍','豪稍'],
  ['白想','白相'],['百相','白相'],['大寡','搭寡'],['搭瓜','搭寡'],
  ['搞子','杲昃'],['高子','杲昃'],['事替','事体'],['是体','事体'],
  ['老为','劳为'],['捞为','劳为'],['把哉','罢哉'],['八哉','罢哉'],
  ['一他刮子','一塌刮子'],['胖海','旁海'],
];
ASR_FIX.sort((a,b) => b[0].length - a[0].length);

function correctASR(text) {
  let r = text;
  for (const [wrong, right] of ASR_FIX) {
    if (r.includes(wrong) && wrong !== right) r = r.replaceAll(wrong, right);
  }
  // 句中"不+动词" → "勿+动词"
  r = r.replace(/不(?=[走做说吃看想会用能好去来买写开给])/, '勿');
  // 句尾语气词纠正
  r = r.replace(/的$/, '呃').replace(/了$/, '咧').replace(/吗$/, '伐');
  return r;
}

// ============ 翻译规则 ============
const R_M2D = [
  ['是不是','阿是'],['要不要','阿要'],['能不能','阿能'],['会不会','阿会'],['好不好','阿好'],
  ['不知道','勿晓得'],['不要紧','勿要紧'],['怎么了','怎呃咧'],['干什么','做什的'],['多少钱','几钿'],
  ['怎么样','怎呃样'],['这么多','搿呃多'],['那么远','嗨呃远'],
  ['我们','我俫'],['你们','你俫'],['他们','他俫'],['咱们','我俫'],
  ['自己','自家'],['人家','别家'],['什么','什的'],['怎么','怎呃'],['哪里','哪块'],['多少','好多'],
  ['非常','蛮蛮'],['特别','蛮蛮'],['很','蛮'],['太','忒'],
  ['厉害','结棍'],['一定','安安'],['全部','一塌刮子'],
  ['没有','没得'],['不要','嫑'],['不行','弗来事'],
  ['知道','晓得'],['看','望'],['找','寻'],['洗','汏'],['玩','白相'],['说','讲'],
  ['睡觉','困觉'],['聊天','搭寡'],['回家','家去'],['回来','转来'],
  ['讨厌','犯嫌'],['喜欢','欢喜'],['帮忙','帮衬'],['谢谢','难为'],
  ['高兴','快活'],['生气','气不过'],['烦恼','懊糟'],['麻烦','劳为'],
  ['今天','今朝'],['明天','明朝'],['昨天','昨日子'],['后天','后朝'],
  ['晚上','侯告'],['上午','上昼'],['下午','下半天'],['中午','中昼'],
  ['现在','搿歇'],['以前','老早'],['一会儿','歇歇'],['马上','豪稍'],['算了','罢哉'],
  ['去年','旧年'],['今年','今年子'],
  ['爷爷','嗲嗲'],['奶奶','阿婆'],['姐姐','假假'],['哥哥','锅锅'],
  ['丈夫','男将'],['妻子','女将'],['小孩','小囡'],['邻居','邻舍'],
  ['东西','杲昃'],['事情','事体'],['衣服','衣裳'],['厨房','灶间'],
  ['早饭','朝饭'],['午饭','中饭'],['晚饭','夜饭'],
  ['黄鳝','长鱼'],['螃蟹','旁海'],['萝卜干','罗服锅儿'],
  ['漂亮','标致'],['聪明','灵光'],['笨','戆'],['累','吃力'],
  ['舒服','忺'],['冷','瀴'],['脏','龌龊'],['小气','抠'],
  ['扔','掼'],['丢','厾'],['放','囥'],['睡','困'],['想','忖'],['给','把'],
];

// D2M多字词
const R_D2M_WORDS = [];
R_M2D.forEach(([s,d]) => { if(d.length>=2) R_D2M_WORDS.push([d,s]); });
R_D2M_WORDS.push(['勿','不'],['呒','没'],['蛮','很'],['寻','找'],['掼','扔'],
  ['囥','放'],['困','睡'],['汏','洗'],['拨','给'],['搲','拿'],['揩','擦'],
  ['噇','吃'],['夯','打'],['踅','走'],['忖','想'],['瀴','冷'],['忺','舒服'],
  ['戆','笨'],['相','看']);
R_D2M_WORDS.sort((a,b) => b[0].length - a[0].length);

const SUFFIX_D2M = {呃:'的',咧:'了',啘:'吧',哉:'了',噶:'啊',伐:'吗',哩:'呢'};
const SUFFIX_M2D = {的:'呃',了:'咧',吧:'啘',吗:'伐',呢:'哩',啊:'噶'};

// 方言标记词
const DIALECT_MARKS = new Set(['我俫','你俫','他俫','晓得','什的','怎呃','没得','犯嫌','帮衬',
  '嗲嗲','男将','女将','锅锅','假假','搿歇','搿样','嗨样','搿搭','嗨搭','豪稍','罢哉',
  '侯告','今朝','明朝','蛮蛮','阿是','阿要','弗要','嫑','结棍','杲昃','事体','衣裳',
  '白相','家去','转来','朝饭','夜饭','长鱼','旁海','罗服锅儿','困觉','搭寡','懊糟',
  '灵光','标致','戆','吃力','瀴','忺','寻','掼','囥','汏','拨','搲','揩','噇','夯']);

function detectDir(text) {
  let c = 0;
  for (const m of DIALECT_MARKS) { if(text.includes(m)) c++; }
  return c >= 1 ? 'd2m' : 'm2d';
}

function applyRules(text, rules) {
  let r = text;
  for (const [s,d] of rules) r = r.replaceAll(s, d);
  return r;
}

function m2d(text) {
  let r = applyRules(text, R_M2D);
  for (const [s,d] of Object.entries(SUFFIX_M2D)) {
    if(r.endsWith(s)) { r = r.slice(0,-s.length)+d; break; }
  }
  return r;
}

function d2m(text) {
  let r = applyRules(text, R_D2M_WORDS);
  for (const [d,s] of Object.entries(SUFFIX_D2M)) {
    if(r.endsWith(d)) { r = r.slice(0,-d.length)+s; break; }
  }
  return r;
}

// ============ 主翻译函数 ============
function translate(text, asrMode=false) {
  if(!text||!text.trim()) return {result:'',direction:'unknown',confidence:0,asrCorrected:false};
  text = text.trim();
  const original = text;
  
  // ASR纠错
  if(asrMode) {
    const corrected = correctASR(text);
    if(corrected !== text) text = corrected;
  }
  
  // 检测方向
  const dir = detectDir(text);
  const result = dir === 'm2d' ? m2d(text) : d2m(text);
  const changed = [...text].filter((c,i) => c !== result[i]).length;
  const confidence = Math.min(100, Math.round(changed / Math.max(1, text.length) * 300 + 50));
  
  return {
    result,
    direction: dir,
    directionLabel: dir === 'd2m' ? '方言→普通话' : '普通话→方言',
    confidence,
    asrCorrected: original !== text,
    correctedText: text
  };
}

// ============ UI交互 ============
let translateTimer = null;
function autoTranslate() {
  clearTimeout(translateTimer);
  translateTimer = setTimeout(doTranslate, 300);
}

function doTranslate() {
  const text = document.getElementById('inputText').value.trim();
  if(!text) { 
    document.getElementById('resultArea').textContent = '翻译结果将显示在这里';
    document.getElementById('directionInfo').style.display = 'none';
    document.getElementById('asrInfo').style.display = 'none';
    return; 
  }
  const r = translate(text, false);
  document.getElementById('resultArea').textContent = r.result;
  document.getElementById('directionInfo').textContent = `${r.directionLabel} | 置信度 ${r.confidence}%`;
  document.getElementById('directionInfo').style.display = 'inline-block';
  document.getElementById('asrInfo').style.display = 'none';
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('resultArea').textContent = '翻译结果将显示在这里';
  document.getElementById('directionInfo').style.display = 'none';
  document.getElementById('asrInfo').style.display = 'none';
}

function copyResult() { copyEl('resultArea'); }
function copyEl(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已复制到剪贴板');
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:20%;left:50%;transform:translateX(-50%);background:rgba(0,210,211,0.9);color:#fff;padding:10px 24px;border-radius:20px;font-size:0.9em;z-index:9999;animation:fadeInOut 2s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ============ 语音朗读（核心改进）============
let _currentAudio = null;

function speakText(elId) {
  const el = document.getElementById(elId);
  const text = el.textContent || el.innerText;
  if(!text || text.includes('将显示在这里')) return;
  
  // 停止之前的朗读
  if(_currentAudio) { _currentAudio.pause(); _currentAudio = null; }
  speechSynthesis.cancel();
  
  showToast('🔊 正在朗读...');
  
  // 方案1: 百度TTS（最可靠，移动端可用）
  const baiduUrl = 'https://tts.baidu.com/text2audio?lan=zh&text=' + 
    encodeURIComponent(text) + '&spd=5&pit=5&vol=9&per=4';
  
  const audio = new Audio(baiduUrl);
  audio.onerror = function() {
    // 方案2: Web Speech API备用
    trySpeechAPI(text);
  };
  audio.oncanplaythrough = function() {
    _currentAudio = audio;
    audio.play().catch(() => trySpeechAPI(text));
  };
  audio.onended = function() { _currentAudio = null; showToast('✅ 朗读完毕'); };
  audio.load();
}

function trySpeechAPI(text) {
  if(!('speechSynthesis' in window)) { showToast('⚠️ 朗读不可用'); return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.includes('zh') && v.localService) 
               || voices.find(v => v.lang.includes('zh'));
  if(zhVoice) u.voice = zhVoice;
  u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.1; u.volume = 1.0;
  u.onend = () => showToast('✅ 朗读完毕');
  u.onerror = () => showToast('⚠️ 朗读不可用');
  speechSynthesis.speak(u);
}

// 确保语音列表加载
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();



// ============ 语音识别（核心改进）============
let recognition = null;
let isRecording = false;

function toggleVoice() {
  if(isRecording) { stopVoice(); return; }
  
  // 检查支持
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) {
    showToast('⚠️ 请使用Chrome浏览器进行语音识别');
    return;
  }
  
  recognition = new SR();
  recognition.lang = 'zh-CN';     // 标准中文识别
  recognition.continuous = true;  // 持续识别
  recognition.interimResults = true;
  recognition.maxAlternatives = 3; // 获取多个候选结果
  
  let finalTranscript = '';
  
  recognition.onresult = function(e) {
    let interim = '';
    for(let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript;
      if(e.results[i].isFinal) {
        finalTranscript += transcript;
      } else {
        interim += transcript;
      }
    }
    
    const currentText = finalTranscript + interim;
    if(currentText) {
      // 实时显示+翻译
      document.getElementById('voiceResultArea').style.display = 'block';
      document.getElementById('voiceASR').textContent = currentText;
      
      // ASR纠错
      const corrected = correctASR(currentText);
      const wasCorrected = corrected !== currentText;
      
      if(wasCorrected) {
        document.getElementById('voiceCorrectedCard').style.display = 'block';
        document.getElementById('voiceCorrected').textContent = corrected;
      } else {
        document.getElementById('voiceCorrectedCard').style.display = 'none';
      }
      
      // 翻译
      const r = translate(corrected, false);
      document.getElementById('voiceTranslated').textContent = r.result;
    }
  };
  
  recognition.onerror = function(e) {
    console.error('语音识别错误:', e.error);
    if(e.error === 'not-allowed') {
      showToast('⚠️ 请允许麦克风权限');
    } else if(e.error === 'no-speech') {
      showToast('⚠️ 没有检测到语音，请再试一次');
    }
    stopVoice();
  };
  
  recognition.onend = function() {
    // 如果还在录音状态，自动重启（防止意外停止）
    if(isRecording) {
      try { recognition.start(); } catch(e) {}
    }
  };
  
  try {
    recognition.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('voiceStatus').classList.add('active');
  } catch(e) {
    showToast('⚠️ 语音识别启动失败');
  }
}

function stopVoice() {
  if(recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
  isRecording = false;
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micBtn').textContent = '🎤';
  document.getElementById('voiceStatus').classList.remove('active');
  
  // 朗读翻译结果
  const translated = document.getElementById('voiceTranslated').textContent;
  if(translated) {
    setTimeout(() => speakText('voiceTranslated'), 500);
  }
}
