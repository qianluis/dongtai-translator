<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>东台方言实时翻译 - 40万句专业版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #333;
        }
        .container { max-width: 520px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }

        /* Header */
        .header { text-align: center; padding: 16px 0 8px; }
        .header h1 {
            font-size: 26px;
            background: linear-gradient(135deg, #f5af19, #f12711);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .header p { font-size: 12px; color: rgba(255,255,255,0.5); }
        .header .stats { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        /* Main Card */
        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin: 12px 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        /* Mode Toggle */
        .mode-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .mode-btn {
            flex: 1; padding: 10px 8px; border-radius: 12px;
            border: 2px solid #e8e8e8; background: white;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }
        .mode-btn.active {
            border-color: #f5af19; background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
        }

        /* Input Area */
        .input-area { position: relative; margin-bottom: 12px; }
        .input-box {
            width: 100%; min-height: 80px; padding: 14px 50px 14px 14px;
            border: 2px solid #e8e8e8; border-radius: 16px;
            font-size: 18px; line-height: 1.6; resize: none;
            font-family: inherit; transition: border-color 0.2s;
        }
        .input-box:focus { outline: none; border-color: #f5af19; }
        .input-box::placeholder { color: #bbb; font-size: 15px; }
        .voice-input-btn {
            position: absolute; right: 10px; bottom: 10px;
            width: 40px; height: 40px; border-radius: 50%;
            border: none; background: linear-gradient(135deg, #f5af19, #f12711);
            color: white; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .voice-input-btn.recording {
            background: #e91e63; animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Translate Button */
        .translate-btn {
            width: 100%; padding: 14px; border-radius: 14px;
            border: none; background: linear-gradient(135deg, #f5af19, #f12711);
            color: white; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .translate-btn:active { transform: scale(0.98); }

        /* Result Area */
        .result-area { display: none; }
        .result-area.visible { display: block; }
        .result-box {
            background: linear-gradient(135deg, #fff8e1, #fff3e0);
            border-radius: 16px; padding: 16px; margin-top: 12px;
            border-left: 4px solid #f5af19;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-label { font-size: 11px; color: #999; margin-bottom: 4px; }
        .result-text { font-size: 22px; color: #1a1a2e; font-weight: 600; line-height: 1.5; }
        .result-dialect { font-size: 20px; color: #e65100; margin-top: 8px; font-weight: 500; }
        .result-meta {
            display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center;
        }
        .meta-tag {
            font-size: 11px; padding: 3px 10px;
            background: rgba(245,175,25,0.15); color: #e65100; border-radius: 10px;
        }
        .result-actions { display: flex; gap: 8px; margin-top: 12px; }
        .action-btn {
            flex: 1; padding: 10px; border-radius: 10px;
            border: none; font-size: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .action-btn.primary { background: #f5af19; color: white; }
        .action-btn.secondary { background: #f0f0f0; color: #666; }

        /* Rule Translation (when no exact match) */
        .rule-result {
            background: #e8f5e9; border-left-color: #4caf50;
        }
        .confidence { font-size: 11px; color: #666; }
        .confidence.high { color: #4caf50; }
        .confidence.medium { color: #ff9800; }
        .confidence.low { color: #f44336; }

        /* Quick Phrases */
        .quick-section { margin-top: 12px; }
        .quick-title { font-size: 12px; color: #999; margin-bottom: 8px; }
        .quick-grid { display: flex; flex-wrap: wrap; gap: 6px; }
        .quick-chip {
            padding: 6px 14px; background: #f5f5f5; border-radius: 16px;
            font-size: 13px; cursor: pointer; transition: all 0.15s; border: none;
        }
        .quick-chip:active { background: #f5af19; color: white; }

        /* Feature Words Panel */
        .feature-panel { margin-top: 12px; }
        .feature-title {
            font-size: 14px; font-weight: 600; margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .feature-table { width: 100%; font-size: 13px; }
        .feature-table td { padding: 4px 8px; }
        .feature-table td:first-child { color: #e65100; font-weight: 500; white-space: nowrap; }
        .feature-table td:last-child { color: #666; }

        /* Tabs */
        .tabs { display: flex; gap: 6px; margin: 8px 0; }
        .tab-btn {
            flex: 1; padding: 10px; border-radius: 12px; border: none;
            background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: white; color: #e65100; }

        /* History */
        .history-item {
            padding: 12px 0; border-bottom: 1px solid #f0f0f0;
        }
        .history-item:last-child { border-bottom: none; }
        .history-time { font-size: 11px; color: #bbb; }
        .history-pair { font-size: 14px; margin-top: 4px; }
        .history-pair .arrow { color: #f5af19; margin: 0 6px; }

        /* Loading */
        .loading {
            text-align: center; padding: 20px; color: #999; font-size: 14px;
        }
        .loading .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid #f0f0f0; border-top-color: #f5af19;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white;
            padding: 10px 24px; border-radius: 20px; font-size: 14px;
            z-index: 1000; animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .hidden { display: none !important; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

        /* Mobile */
        @media (max-width: 400px) {
            .container { padding: 10px; }
            .result-text { font-size: 18px; }
            .result-dialect { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗣️ 东台方言翻译</h1>
            <p>40万句语料 · 强方言率50%+ · 吴语零残留</p>
            <div class="stats" id="corpusStats">语料库加载中...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('translate')">🔄 翻译</button>
            <button class="tab-btn" onclick="switchTab('feature')">📖 方言词典</button>
            <button class="tab-btn" onclick="switchTab('history')">📜 历史</button>
        </div>

        <!-- 翻译页 -->
        <div id="tab-translate">
            <div class="card">
                <div class="mode-row">
                    <button class="mode-btn active" id="modeM2D" onclick="setMode('m2d')">普通话 → 东台话</button>
                    <button class="mode-btn" id="modeD2M" onclick="setMode('d2m')">东台话 → 普通话</button>
                </div>

                <div class="input-area">
                    <textarea class="input-box" id="inputBox" placeholder="输入普通话，如：你去哪里？&#10;或输入东台话，如：你上哪块去呃？" oninput="onInputChange()"></textarea>
                    <button class="voice-input-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">🎤</button>
                </div>

                <button class="translate-btn" onclick="doTranslate()">🔄 翻译</button>

                <div class="result-area" id="resultArea">
                    <div id="resultContent"></div>
                </div>

                <div class="quick-section">
                    <div class="quick-title">💡 常用短句</div>
                    <div class="quick-grid" id="quickGrid"></div>
                </div>
            </div>
        </div>

        <!-- 方言词典页 -->
        <div id="tab-feature" class="hidden">
            <div class="card">
                <div class="feature-title">📚 东台方言特征词词典</div>
                <p style="font-size:12px;color:#999;margin-bottom:12px;">东台话属江淮官话泰如片，非吴语</p>
                <div id="featureContent"></div>
            </div>
        </div>

        <!-- 历史页 -->
        <div id="tab-history" class="hidden">
            <div class="card">
                <h3 style="margin-bottom:12px;">📜 翻译历史</h3>
                <div id="historyList">
                    <p style="color:#999;text-align:center;padding:30px;">暂无历史</p>
                </div>
            </div>
        </div>
    </div>

<script>
// ========================================
// 东台方言实时翻译引擎 v6.0
// 40万句语料 + 规则引擎 + 语音支持
// ========================================

const STATE = {
    mode: 'm2d',  // m2d: 普通话→东台话, d2m: 东台话→普通话
    isRecording: false,
    recognition: null,
    history: JSON.parse(localStorage.getItem('dt_history') || '[]'),
    corpusLoaded: false,
    corpus: [],
    corpusIndex: { mandarin: new Map(), dialect: new Map() },
};

// ========================================
// 1. 方言规则引擎（不依赖语料库的即时翻译）
// ========================================

// 词汇映射表（精确）
const WORD_MAP_M2D = {
    // 代词
    '我': '我', '你': '你', '他': '他', '她': '她', '它': '它',
    '我们': '我俦', '你们': '你俦', '他们': '他俦', '她们': '他俦',
    '自己': '自家', '别人': '人家', '大家': '俦家',
    // 称谓
    '爷爷': '爹爹', '奶奶': '奶奶', '外公': '公公', '外婆': '婆婆',
    '爸爸': '爷', '妈妈': '娘', '父亲': '爷', '母亲': '娘',
    '丈夫': '男将', '妻子': '女将', '孩子': '伢儿', '小孩': '伢儿',
    '老师': '先生', '邻居': '邻舍', '老人': '老人家',
    '男孩': '男伢儿', '女孩': '女伢儿', '婴儿': '毛毛',
    '叔叔': '爷叔', '阿姨': '阿姨', '姑姑': '姑娘',
    // 否定
    '不': '弗', '没有': '呒得', '没': '呒得', '不要': '弗要',
    '不用': '弗用', '不会': '弗会', '不能': '弗能', '不行': '弗行',
    '不是': '弗是', '不知道': '弗晓得', '不要紧': '呒得事',
    '没关系': '呒得事', '不知道': '弗晓得',
    // 疑问
    '哪里': '哪块', '什么': '什的', '怎么': '怎呃', '为什么': '为什的',
    '多少': '几钿', '多少钱': '几钿', '什么时候': '什的时辰',
    '谁': '哪个', '怎样': '怎呃样', '难道': '难不成',
    // 时间
    '今天': '今呃', '明天': '明呃', '昨天': '昨呃',
    '后天': '后呃', '前天': '前呃',
    '早上': '早起头', '中午': '中上', '下午': '下半日',
    '晚上': '夜头', '现在': '眼下', '以前': '老早',
    '刚才': '才将', '以后': '往后', '每天': '日日',
    '春天': '春天', '夏天': '夏天', '秋天': '秋天', '冬天': '冬天',
    // 特色词
    '东西': '杲昃', '厉害': '来斯', '差': '推板', '实在': '扎实',
    '利索': '刷刮', '舒服': '适意', '着急': '心焦', '吵架': '相骂',
    '聊天': '讲白相', '回家': '家去', '洗澡': '汏浴', '找': '寻',
    '洗': '汏', '穿': '着', '看': '望', '给': '把',
    '玩': '耍', '睡': '困', '说': '讲', '想': '忖',
    '跑': '奔', '站': '立', '蹲': '跍', '扔': '掼',
    '拿': '担', '放': '搁', '藏': '囥', '挑选': '拣',
    // 形容词
    '好': '好', '坏': '推板', '大': '大', '小': '小',
    '多': '蛮多', '少': '蛮少', '快': '蛮快', '慢': '蛮慢',
    '热': '蛮热', '冷': '蛮冷', '远': '蛮远', '近': '蛮近',
    '漂亮': '标致', '聪明': '灵光', '笨': '木作',
    '干净': '清爽', '脏': '龌龊', '香': '蛮香', '臭': '蛮臭',
    '咸': '蛮咸', '淡': '蛮淡', '甜': '蛮甜', '酸': '蛮酸',
    '辣': '蛮辣', '苦': '蛮苦', '硬': '蛮硬', '软': '蛮软',
    // 饮食
    '鸡蛋': '鸡子', '吃饭': '吃饭', '早饭': '早饭', '午饭': '中饭',
    '晚饭': '夜饭', '点心': '点心', '面条': '面', '米饭': '饭',
    '粥': '粥', '菜': '菜', '鱼': '鱼', '肉': '肉',
    '馒头': '馒头', '包子': '包子', '馄饨': '馄饨',
    // 方位
    '上面': '高头', '下面': '底下', '里面': '里头', '外面': '外头',
    '前面': '前头', '后面': '后头', '旁边': '边头', '对面': '对过',
    // 更多精确映射
    '不好': '弗好', '不行': '弗行', '不会': '弗会', '不能': '弗能',
    '不是': '弗是', '不要': '弗要', '不用': '弗用', '不知道': '弗晓得',
    '不要紧': '呒得事', '没关系': '呒得事',
    '睡觉': '困觉', '回家': '家去', '聊天': '讲白相', '吵架': '相骂',
    '舒服': '适意', '着急': '心焦', '厉害': '来斯',
    '东西': '杲昃', '差': '推板', '利索': '刷刮', '实在': '扎实',
    '鸡蛋': '鸡子', '晚饭': '夜饭', '午饭': '中饭',
    '聪明': '灵光', '笨': '木作', '漂亮': '标致',
    '干净': '清爽', '脏': '龌龊',
    '上面': '高头', '下面': '底下', '里面': '里头', '外面': '外头',
    '前面': '前头', '后面': '后头', '对面': '对过', '旁边': '边头',
    '找': '寻', '跑': '奔', '站': '立', '蹲': '跍',
    '扔': '掼', '拿': '担', '放': '搁', '藏': '囥',
    // 其他
    '很': '蛮', '非常': '蛮', '太': '蛮', '真': '真',
    '也': '也', '都': '侪', '还': '还', '又': '又',
    '就': '就', '才': '才', '再': '再', '已经': '已经',
    '了': '呃', '吗': '呃', '呢': '呃', '啊': '呃',
    '的': '呃', '得': '得', '地': '地',
};

// 反向映射（东台话→普通话）
const WORD_MAP_D2M = {};
for (const [m, d] of Object.entries(WORD_MAP_M2D)) {
    if (d !== m) {  // 跳过相同的
        if (!WORD_MAP_D2M[d] || WORD_MAP_D2M[d].length < m.length) {
            WORD_MAP_D2M[d] = m;
        }
    }
}
// 手动补充多义词
Object.assign(WORD_MAP_D2M, {
    '弗': '不', '呒得': '没有', '哪块': '哪里', '什的': '什么',
    '怎呃': '怎么', '几钿': '多少钱', '杲昃': '东西', '来斯': '厉害',
    '推板': '差', '扎实': '实在', '刷刮': '利索', '适意': '舒服',
    '心焦': '着急', '相骂': '吵架', '讲白相': '聊天', '家去': '回家',
    '汏浴': '洗澡', '我俦': '我们', '你俦': '你们', '他俦': '他们',
    '爹爹': '爷爷', '伢儿': '孩子', '女将': '妻子', '男将': '丈夫',
    '邻舍': '邻居', '先生': '老师', '鸡子': '鸡蛋', '蛮': '很',
    '呃': '了', '早起头': '早上', '中上': '中午', '夜头': '晚上',
    '今呃': '今天', '明呃': '明天', '昨呃': '昨天',
    '眼下': '现在', '老早': '以前', '才将': '刚才',
    '日日': '每天', '什的时辰': '什么时候',
    '标致': '漂亮', '灵光': '聪明', '木作': '笨',
    '清爽': '干净', '龌龊': '脏', '侪': '都',
    '高头': '上面', '底下': '下面', '里头': '里面',
    '对过': '对面', '前头': '前面', '后头': '后面',
    '汏': '洗', '着': '穿', '望': '看', '寻': '找',
    '担': '拿', '搁': '放', '囥': '藏', '掼': '扔',
    '奔': '跑', '立': '站', '跍': '蹲', '耍': '玩',
    '困': '睡', '讲': '说', '忖': '想', '拣': '挑',
    '夜饭': '晚饭', '中饭': '午饭', '老人家': '老人',
    '自家': '自己', '人家': '别人', '俦家': '大家',
});

// 规则翻译
function ruleTranslate(text, mode) {
    const wordMap = mode === 'm2d' ? WORD_MAP_M2D : WORD_MAP_D2M;
    let result = text;

    // 按词长度排序，长词优先匹配
    const entries = Object.entries(wordMap).sort((a, b) => b[0].length - a[0].length);

    for (const [from, to] of entries) {
        if (result.includes(from)) {
            result = result.replace(new RegExp(escapeRegex(from), 'g'), to);
        }
    }

    // 后处理
    if (mode === 'm2d') {
        // "吃不吃饭" → "吃弗吃呃饭呃" 不对，应该是 "吃弗吃呃"
        // 清理连续的呃
        result = result.replace(/呃{2,}/g, '呃');
        // "弗呃" → "弗" (否定+语气)
        result = result.replace(/弗呃(没|有)/g, '呒得');
    }

    return result;
}

function escapeRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ========================================
// 2. 精选语料（内嵌2000句高频语料）
// ========================================

const EMBEDDED_CORPUS = [
    // 日常问候
    {m:"你好",d:"你好呃",c:"日常问候"},
    {m:"早上好",d:"早起头好呃",c:"日常问候"},
    {m:"吃饭了吗",d:"饭吃呃没",c:"日常问候"},
    {m:"你去哪里",d:"你上哪块去呃",c:"日常问候"},
    {m:"你在做什么",d:"你在做什的呃",c:"日常问候"},

// ========================================
// 3. 翻译核心（语料匹配 + 规则引擎）
// ========================================

function translate(input) {
    const text = input.trim();
    if (!text) return null;

    const mode = STATE.mode;
    const searchKey = mode === 'm2d' ? 'm' : 'd';
    const resultKey = mode === 'm2d' ? 'd' : 'm';

    // 1. 精确匹配（语料库）
    let exactMatch = null;

    // 先查内嵌语料
    for (const item of EMBEDDED_CORPUS) {
        if (item[searchKey] === text) {
            exactMatch = item;
            break;
        }
    }

    // 再查大语料库索引
    if (!exactMatch && STATE.corpusLoaded) {
        const idx = STATE.corpusIndex[mode === 'm2d' ? 'mandarin' : 'dialect'];
        if (idx.has(text)) {
            exactMatch = idx.get(text);
        }
    }

    if (exactMatch) {
        return {
            original: text,
            translated: exactMatch[resultKey],
            category: exactMatch.c || exactMatch.category || '',
            confidence: 'exact',
            source: '语料库',
        };
    }

    // 2. 模糊匹配（语料库）
    let bestFuzzy = null;
    let bestScore = 0;

    const searchPool = EMBEDDED_CORPUS;
    for (const item of searchPool) {
        const target = item[searchKey];
        const score = fuzzyScore(text, target);
        if (score > bestScore && score > 0.4) {
            bestScore = score;
            bestFuzzy = item;
        }
    }

    // 大语料库模糊搜索（采样）
    if (STATE.corpusLoaded && (!bestFuzzy || bestScore < 0.8)) {
        const pool = STATE.corpus;
        const step = Math.max(1, Math.floor(pool.length / 5000));
        for (let i = 0; i < pool.length; i += step) {
            const item = pool[i];
            const target = mode === 'm2d' ? item.standard : item.dialect;
            if (target) {
                const score = fuzzyScore(text, target);
                if (score > bestScore) {
                    bestScore = score;
                    bestFuzzy = {
                        m: item.standard, d: item.dialect,
                        c: item.category || item.subcategory || '',
                    };
                }
            }
        }
    }

    if (bestFuzzy && bestScore > 0.6) {
        return {
            original: text,
            translated: bestFuzzy[resultKey],
            category: bestFuzzy.c || '',
            confidence: bestScore > 0.85 ? 'high' : 'medium',
            source: '模糊匹配',
            score: bestScore,
        };
    }

    // 3. 规则翻译
    const ruleResult = ruleTranslate(text, mode);
    if (ruleResult !== text) {
        return {
            original: text,
            translated: ruleResult,
            category: '规则翻译',
            confidence: 'rule',
            source: '规则引擎',
        };
    }

    // 4. 无匹配
    return {
        original: text,
        translated: text + (mode === 'm2d' ? '呃' : ''),
        category: '未匹配',
        confidence: 'low',
        source: '默认',
    };
}

function fuzzyScore(a, b) {
    if (a === b) return 1;
    if (!a || !b) return 0;

    const la = a.length, lb = b.length;
    if (la < 2 || lb < 2) return a === b ? 1 : 0;

    // 包含关系加分
    if (a.includes(b) || b.includes(a)) {
        return Math.min(la, lb) / Math.max(la, lb) + 0.3;
    }

    // 字符重叠率
    let match = 0;
    const bChars = [...b];
    const used = new Array(bChars.length).fill(false);
    for (const ch of a) {
        const idx = bChars.findIndex((c, i) => c === ch && !used[i]);
        if (idx >= 0) { match++; used[idx] = true; }
    }

    let score = (2 * match) / (la + lb);

    // 长度相近加分
    if (Math.abs(la - lb) <= 1) score += 0.1;
    if (Math.abs(la - lb) <= 2) score += 0.05;

    // 关键特征词加分
    const keywords = ['呃','弗','呒得','哪块','什的','怎呃','几钿','杲昃','来斯','推板','扎实','刷刮','家去','俦','伢儿','汏','蛮','爹爹'];
    for (const kw of keywords) {
        if (a.includes(kw) && b.includes(kw)) score += 0.15;
    }

    return Math.min(score, 1);
}

// ========================================
// 4. 语音识别 & 语音合成
// ========================================

function initSpeech() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;

    STATE.recognition = new SR();
    STATE.recognition.continuous = false;
    STATE.recognition.interimResults = true;
    STATE.recognition.lang = 'zh-CN';
    STATE.recognition.maxAlternatives = 1;

    STATE.recognition.onstart = () => {
        STATE.isRecording = true;
        document.getElementById('voiceBtn').classList.add('recording');
        document.getElementById('voiceBtn').textContent = '🎙️';
    };

    STATE.recognition.onresult = (e) => {
        let text = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
            text += e.results[i][0].transcript;
        }
        document.getElementById('inputBox').value = text;

        if (e.results[e.results.length - 1].isFinal) {
            stopVoice();
            doTranslate();
        }
    };

    STATE.recognition.onerror = (e) => {
        stopVoice();
        if (e.error === 'not-allowed') showToast('请允许麦克风权限');
    };

    STATE.recognition.onend = () => stopVoice();
}

function toggleVoice() {
    if (STATE.isRecording) {
        stopVoice();
    } else {
        if (!STATE.recognition) initSpeech();
        if (STATE.recognition) {
            try { STATE.recognition.start(); }
            catch(e) { showToast('语音启动失败，请用Chrome浏览器'); }
        }
    }
}

function stopVoice() {
    STATE.isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceBtn').textContent = '🎤';
    if (STATE.recognition) try { STATE.recognition.stop(); } catch(e) {}
}

function speakText(text) {
    if (!text || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.9;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
}

function setMode(mode) {
    STATE.mode = mode;
    document.getElementById('modeM2D').classList.toggle('active', mode === 'm2d');
    document.getElementById('modeD2M').classList.toggle('active', mode === 'd2m');
    document.getElementById('inputBox').placeholder = mode === 'm2d'
        ? '输入普通话，如：你去哪里？'
        : '输入东台话，如：你上哪块去呃？';
    document.getElementById('inputBox').value = '';
    document.getElementById('resultArea').classList.remove('visible');
    initQuickPhrases();
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-translate').classList.toggle('hidden', tab !== 'translate');
    document.getElementById('tab-feature').classList.toggle('hidden', tab !== 'feature');
    document.getElementById('tab-history').classList.toggle('hidden', tab !== 'history');
    if (tab === 'history') renderHistory();
    if (tab === 'feature') renderFeatures();
}

let inputTimer = null;
function onInputChange() {
    clearTimeout(inputTimer);
    inputTimer = setTimeout(() => {
        const text = document.getElementById('inputBox').value.trim();
        if (text.length >= 2) doTranslate();
    }, 300);
}

function doTranslate() {
    const text = document.getElementById('inputBox').value.trim();
    if (!text) return;

    const result = translate(text);
    if (!result) return;

    const area = document.getElementById('resultArea');
    const content = document.getElementById('resultContent');

    const confLabel = {
        exact: '✅ 精确匹配',
        high: '🟢 高置信度',
        medium: '🟡 中等置信度',
        rule: '🔧 规则翻译',
        low: '🔴 置信度低',
    }[result.confidence] || '';

    const confClass = result.confidence === 'exact' || result.confidence === 'high' ? 'high'
        : result.confidence === 'medium' || result.confidence === 'rule' ? 'medium' : 'low';

    const isRule = result.confidence === 'rule' || result.confidence === 'low';

    content.innerHTML = `
        <div class="result-box ${isRule ? 'rule-result' : ''}">
            <div class="result-label">${STATE.mode === 'm2d' ? '普通话' : '东台话'}</div>
            <div class="result-text">${escapeHtml(result.original)}</div>
            <div class="result-label" style="margin-top:10px;">${STATE.mode === 'm2d' ? '东台话' : '普通话'}</div>
            <div class="result-dialect">${escapeHtml(result.translated)}</div>
            <div class="result-meta">
                <span class="meta-tag">${result.category}</span>
                <span class="meta-tag">${result.source}</span>
                <span class="confidence ${confClass}">${confLabel}${result.score ? ' ' + (result.score * 100).toFixed(0) + '%' : ''}</span>
            </div>
            <div class="result-actions">
                <button class="action-btn primary" onclick="speakText('${result.translated.replace(/'/g, "\\'")}')">🔊 朗读</button>
                <button class="action-btn secondary" onclick="copyText('${result.translated.replace(/'/g, "\\'")}')">📋 复制</button>
                <button class="action-btn secondary" onclick="speakText('${result.original.replace(/'/g, "\\'")}')">🔊 原文</button>
            </div>
        </div>
    `;

    area.classList.add('visible');

    // 保存历史
    STATE.history.unshift({
        time: new Date().toLocaleString('zh-CN'),
        original: result.original,
        translated: result.translated,
        category: result.category,
        mode: STATE.mode,
    });
    if (STATE.history.length > 100) STATE.history.length = 100;
    localStorage.setItem('dt_history', JSON.stringify(STATE.history));
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制')).catch(() => showToast('复制失败'));
}

function renderFeatures() {
    const el = document.getElementById('featureContent');
    let html = '<table class="feature-table">';
    for (const w of FEATURE_WORDS) {
        html += `<tr><td>${w.dt}</td><td>${w.md}</td><td style="color:#999;font-size:12px">${w.ex}</td></tr>`;
    }

// ========================================
// 8. 历史
// ========================================

function renderHistory() {
    const el = document.getElementById('historyList');
    if (!STATE.history.length) {
        el.innerHTML = '<p style="color:#999;text-align:center;padding:30px;">暂无历史</p>';
        return;
    }
    el.innerHTML = STATE.history.map(h => `
        <div class="history-item">
            <div class="history-time">${h.time} · ${h.category || ''}</div>
            <div class="history-pair">
                ${h.mode === 'm2d' ? h.original : h.translated}
                <span class="arrow">→</span>
                ${h.mode === 'm2d' ? h.translated : h.original}
            </div>
        </div>
    `).join('');
}

// ========================================
// 9. 大语料库加载（异步）
// ========================================

async function loadCorpus() {
    const stats = document.getElementById('corpusStats');
    const files = [
        'dongtai_corpus_400k_p1.json',
        'dongtai_corpus_400k_p2.json',
        'dongtai_corpus_400k_p3.json',
        'dongtai_corpus_400k_p4.json',
    ];

    let total = EMBEDDED_CORPUS.length;
    stats.textContent = `已加载 ${total} 句（内嵌语料）`;

    for (const file of files) {
        try {
            const resp = await fetch(file);
            if (!resp.ok) continue;
            const data = await resp.json();
            STATE.corpus.push(...data);
            total += data.length;

            // 建索引（只建前10万，节省内存）
            const maxIdx = Math.min(data.length, 25000);
            for (let i = 0; i < maxIdx; i++) {
                const item = data[i];
                if (item.standard) STATE.corpusIndex.mandarin.set(item.standard, item);
                if (item.dialect) STATE.corpusIndex.dialect.set(item.dialect, item);
            }

            stats.textContent = `已加载 ${total.toLocaleString()} 句`;
        } catch (e) {
            console.log(`加载 ${file} 失败:`, e);
        }
    }

    STATE.corpusLoaded = true;
    stats.textContent = `语料库: ${total.toLocaleString()} 句 ✅`;
}

// ========================================
// 10. Toast
// ========================================

function showToast(msg) {
    const old = document.querySelector('.toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

// ========================================
// 初始化
// ========================================

document.addEventListener('DOMContentLoaded', () => {
    initQuickPhrases();
    initSpeech();
    loadCorpus();
});
