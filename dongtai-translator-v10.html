<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>东台方言翻译器 v10 | TTS语音朗读</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0c29;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--accent:#feca57;--accent2:#ff6b6b;--accent3:#48dbfb;--text:#e8e8e8;--muted:#8899aa;--success:#00d2d3}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,var(--bg) 0%,#302b63 50%,#24243e 100%);min-height:100vh;color:var(--text)}
.container{max-width:900px;margin:0 auto;padding:12px}
header{text-align:center;padding:16px 0 8px}
header h1{font-size:1.6em;background:linear-gradient(90deg,var(--accent2),var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
header .subtitle{color:var(--muted);font-size:0.82em;margin-top:4px}
.stats-bar{display:flex;justify-content:center;gap:8px;margin:8px 0;flex-wrap:wrap}
.stat-pill{background:var(--card);border-radius:16px;padding:4px 12px;font-size:0.78em;border:1px solid var(--border)}
.stat-pill b{color:var(--accent)}
.tab-bar{display:flex;justify-content:center;gap:6px;margin:10px 0 8px}
.tab{padding:6px 16px;border-radius:16px;cursor:pointer;background:var(--card);border:1px solid var(--border);font-size:0.85em;transition:all .3s}
.tab:hover,.tab.active{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#1a1a2e;border-color:transparent;font-weight:600}
.panel{display:none}.panel.active{display:block}
.card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:10px;backdrop-filter:blur(6px)}
.card h3{margin-bottom:8px;color:var(--accent);font-size:0.95em;display:flex;align-items:center;gap:6px}
textarea{width:100%;height:100px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:1em;resize:vertical;font-family:inherit;line-height:1.6}
textarea:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 10px rgba(255,107,107,0.2)}
.btn-row{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:0.85em;cursor:pointer;transition:all .2s;font-weight:500}
.btn-primary{background:linear-gradient(90deg,var(--accent2),var(--accent));color:#1a1a2e}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(255,107,107,0.3)}
.btn-secondary{background:rgba(255,255,255,0.1);color:var(--text);border:1px solid var(--border)}
.btn-voice{background:linear-gradient(90deg,var(--accent3),#0abde3);color:#1a1a2e}
.btn-voice.recording{animation:pulse 1s infinite;background:linear-gradient(90deg,#ff6b6b,#ee5a24)}
.btn-speak{background:linear-gradient(90deg,var(--success),#01a3a4);color:#1a1a2e;font-size:1em;padding:12px 28px;font-weight:700;border-radius:12px;min-width:140px}
.btn-speak:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,210,211,0.4)}
.btn-speak.speaking{background:linear-gradient(90deg,#ff6b6b,#ee5a24);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.result-area{min-height:60px;background:rgba(0,0,0,0.25);border-radius:10px;padding:12px;line-height:1.8;font-size:1.05em;border:1px solid rgba(255,255,255,0.08);white-space:pre-wrap}
.highlight{color:var(--accent);font-weight:600}
.direction-tag{display:inline-block;background:rgba(254,202,87,0.15);color:var(--accent);padding:2px 10px;border-radius:10px;font-size:0.78em;margin:4px 0}
.mic-btn{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),#0abde3);display:inline-flex;align-items:center;justify-content:center;font-size:40px;cursor:pointer;border:none;color:#1a1a2e;box-shadow:0 4px 20px rgba(72,219,251,0.3);transition:all .3s}
.mic-btn.recording{background:linear-gradient(135deg,#ff6b6b,#ee5a24);box-shadow:0 4px 20px rgba(255,107,107,0.4);transform:scale(1.05);animation:pulse 1s infinite}
.voice-status{margin:10px 0;color:var(--accent3);font-size:0.85em;display:none}
.voice-status.active{display:block}
.quick-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.quick-item{background:rgba(255,255,255,0.08);color:var(--text);padding:6px 14px;border-radius:16px;font-size:0.82em;cursor:pointer;transition:all .2s;border:1px solid var(--border)}
.quick-item:hover{background:rgba(254,202,87,0.15);border-color:var(--accent)}
.audio-player{margin-top:8px;display:none}
.audio-player audio{width:100%;border-radius:8px}
.footer{text-align:center;padding:16px 0;color:var(--muted);font-size:0.75em}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>🗣️ 东台方言翻译器</h1>
  <div class="subtitle">江淮官话泰如片 · 语音朗读+实时翻译 · 400K语料库</div>
</header>

<div class="stats-bar">
  <div class="stat-pill">📊 400K语料</div>
  <div class="stat-pill">🎯 100%强方言</div>
  <div class="stat-pill">🔧 140+规则</div>
  <div class="stat-pill">🎤 ASR纠错</div>
  <div class="stat-pill">🔊 语音朗读</div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('text')">📝 文字翻译</div>
  <div class="tab" onclick="switchTab('voice')">🎤 语音翻译</div>
</div>

<!-- 文字翻译面板 -->
<div id="panel-text" class="panel active">
<div class="card">
  <h3>📝 文字翻译</h3>
  <textarea id="inputText" placeholder="输入普通话或东台方言，自动识别方向..." oninput="autoTranslate()"></textarea>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="doTranslate()">翻译</button>
    <button class="btn btn-secondary" onclick="clearAll()">清空</button>
  </div>
  <div id="directionInfo" class="direction-tag" style="display:none"></div>
  <div id="resultArea" class="result-area" style="margin-top:8px">翻译结果将显示在这里</div>
  <div class="btn-row" style="margin-top:10px">
    <button class="btn btn-speak" id="speakBtn" onclick="speakResult()">🔊 朗读译文</button>
    <button class="btn btn-speak" id="speakInputBtn" onclick="speakInput()" style="background:linear-gradient(90deg,#48dbfb,#0abde3)">🔊 朗读原文</button>
    <button class="btn btn-secondary" onclick="copyResult()">📋 复制</button>
  </div>
  <div id="audioPlayer" class="audio-player">
    <audio id="audioEl" controls></audio>
  </div>
</div>
<div class="card">
  <h3>💬 点击即翻译+朗读</h3>
  <div class="quick-grid" id="quickPhrases"></div>
</div>
</div>

<!-- 语音翻译面板 -->
<div id="panel-voice" class="panel">
<div class="card" style="text-align:center;padding:24px">
  <h3>🎤 语音翻译</h3>
  <p style="color:var(--muted);font-size:0.82em;margin:8px 0">说普通话或东台话，自动识别+翻译+朗读</p>
  <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>
  <div class="voice-status" id="voiceStatus">正在聆听...</div>
  <div id="voiceResultArea" style="display:none;text-align:left;margin-top:16px">
    <div class="card" style="border-left:3px solid var(--accent3)"><h3>🔍 语音识别</h3><div id="voiceASR" class="result-area"></div></div>
    <div class="card" id="voiceCorrectedCard" style="border-left:3px solid var(--success);display:none"><h3>✅ ASR纠错</h3><div id="voiceCorrected" class="result-area"></div></div>
    <div class="card" style="border-left:3px solid var(--accent)"><h3>📝 翻译结果</h3><div id="voiceTranslated" class="result-area"></div>
    <div class="btn-row" style="margin-top:8px"><button class="btn btn-speak" onclick="speakEl('voiceTranslated')">🔊 朗读</button></div>
    </div>
  </div>
</div>
</div>

<div class="footer">东台方言翻译器 v10 · 语音朗读 · <a href="https://github.com/qianluis/dongtai-translator" style="color:var(--accent3)">GitHub</a></div>
</div>

<script>
// ============ ASR纠错层 ============
const ASR_FIX=[['我拉','我俫'],['我啦','我俫'],['我俩','我俫'],['我勒','我俫'],['你拉','你俫'],['你啦','你俫'],['你俩','你俫'],['他拉','他俫'],['他啦','他俫'],['他勒','他俫'],['十的','什的'],['什地','什的'],['怎呢','怎呃'],['真呢','怎呃'],['几点','几钿'],['几店','几钿'],['今早','今朝'],['金朝','今朝'],['明早','明朝'],['后高','侯告'],['厚稿','侯告'],['候告','侯告'],['猴搞','侯告'],['后搞','侯告'],['个歇','搿歇'],['格歇','搿歇'],['没的','没得'],['美的','没得'],['不来事','勿来事'],['不晓得','勿晓得'],['跌跌','嗲嗲'],['男酱','男将'],['女酱','女将'],['歌歌','锅锅'],['佳佳','假假'],['结滚','结棍'],['解棍','结棍'],['饭嫌','犯嫌'],['凡嫌','犯嫌'],['零光','灵光'],['林光','灵光'],['表致','标致'],['小的','晓得'],['晓的','晓得'],['邦衬','帮衬'],['号稍','豪稍'],['好稍','豪稍'],['白想','白相'],['百相','白相'],['大寡','搭寡'],['搭瓜','搭寡'],['搞子','杲昃'],['高子','杲昃'],['事替','事体'],['老为','劳为'],['把哉','罢哉'],['八哉','罢哉'],['胖海','旁海']];
ASR_FIX.sort((a,b)=>b[0].length-a[0].length);
function correctASR(t){let r=t;for(const[w,g]of ASR_FIX){if(r.includes(w)&&w!==g)r=r.replaceAll(w,g);}r=r.replace(/不(?=[走做说吃看想会用能好去来买写开给])/g,'勿');return r;}

// ============ 翻译规则 ============
const R_M2D=[['是不是','阿是'],['要不要','阿要'],['能不能','阿能'],['不知道','勿晓得'],['不要紧','勿要紧'],['怎么了','怎呃咧'],['干什么','做什的'],['多少钱','几钿'],['怎么样','怎呃样'],['这么多','搿呃多'],['那么远','嗨呃远'],['我们','我俫'],['你们','你俫'],['他们','他俫'],['自己','自家'],['什么','什的'],['怎么','怎呃'],['哪里','哪块'],['多少','好多'],['非常','蛮蛮'],['特别','蛮蛮'],['很','蛮'],['太','忒'],['厉害','结棍'],['全部','一塌刮子'],['没有','没得'],['不要','嫑'],['不行','弗来事'],['知道','晓得'],['看','望'],['找','寻'],['洗','汏'],['玩','白相'],['说','讲'],['睡觉','困觉'],['聊天','搭寡'],['回家','家去'],['回来','转来'],['讨厌','犯嫌'],['喜欢','欢喜'],['帮忙','帮衬'],['谢谢','难为'],['高兴','快活'],['生气','气不过'],['烦恼','懊糟'],['麻烦','劳为'],['今天','今朝'],['明天','明朝'],['昨天','昨日子'],['后天','后朝'],['晚上','侯告'],['上午','上昼'],['下午','下半天'],['中午','中昼'],['现在','搿歇'],['以前','老早'],['一会儿','歇歇'],['马上','豪稍'],['算了','罢哉'],['爷爷','嗲嗲'],['奶奶','阿婆'],['姐姐','假假'],['哥哥','锅锅'],['丈夫','男将'],['妻子','女将'],['小孩','小囡'],['东西','杲昃'],['事情','事体'],['衣服','衣裳'],['厨房','灶间'],['早饭','朝饭'],['午饭','中饭'],['晚饭','夜饭'],['黄鳝','长鱼'],['螃蟹','旁海'],['漂亮','标致'],['聪明','灵光'],['笨','戆'],['累','吃力'],['舒服','忺'],['冷','瀴'],['脏','龌龊'],['扔','掼'],['丢','厾'],['放','囥'],['睡','困'],['想','忖'],['给','把'],['你好','蛮好呃'],['再见','再会'],['谢谢','难为你'],['对不起','勿好意思'],['吃饭','噇饭'],['很冷','蛮蛮瀴'],['了不起','结棍'],['没关系','勿要紧'],['下雨','落雨'],['医生','郎中'],['学校','学堂']];
const R_D2M_WORDS=[];R_M2D.forEach(([s,d])=>{if(d.length>=2)R_D2M_WORDS.push([d,s]);});
R_D2M_WORDS.push(['勿','不'],['蛮','很'],['寻','找'],['掼','扔'],['囥','放'],['困','睡'],['汏','洗'],['拨','给'],['搲','拿'],['揩','擦'],['瀴','冷'],['忺','舒服'],['戆','笨']);
R_D2M_WORDS.sort((a,b)=>b[0].length-a[0].length);
const SUFFIX_D2M={'呃':'的','咧':'了','啘':'吧','哉':'了','噶':'啊','伐':'吗','哩':'呢'};
const SUFFIX_M2D={'的':'呃','了':'咧','吧':'啘','吗':'呃','呢':'哩','啊':'噶'};
const DIALECT_MARKS=new Set(['我俫','你俫','他俫','晓得','什的','怎呃','没得','犯嫌','帮衬','嗲嗲','男将','女将','搿歇','豪稍','罢哉','侯告','今朝','蛮蛮','阿是','结棍','杲昃','事体','白相','家去','困觉','搭寡','标致','灵光','戆','吃力','瀴','忺','寻','掼','囥','汏','拨','搲']);
function detectDir(t){let c=0;for(const m of DIALECT_MARKS)if(t.includes(m))c++;return c>=1?'d2m':'m2d';}
function m2d(t){let r=t;for(const[s,d]of R_M2D)r=r.replaceAll(s,d);for(const[s,d]of Object.entries(SUFFIX_M2D))if(r.endsWith(s)){r=r.slice(0,-s.length)+d;break;}return r;}
function d2m(t){let r=t;for(const[s,d]of R_D2M_WORDS)r=r.replaceAll(s,d);for(const[d,s]of Object.entries(SUFFIX_D2M))if(r.endsWith(d)){r=r.slice(0,-d.length)+s;break;}return r;}
function translate(t,asr=false){if(!t||!t.trim())return{result:'',direction:'unknown'};t=t.trim();if(asr)t=correctASR(t);const dir=detectDir(t);const r=dir==='m2d'?m2d(t):d2m(t);return{result:r,direction:dir,label:dir==='d2m'?'方言→普通话':'普通话→方言'};}

// ============ TTS朗读 ============
let _currentAudio=null;

function speakText(text) {
  if(!text||text.includes('将显示在这里'))return;
  text=text.trim();
  
  // 停止之前的朗读
  if(_currentAudio){try{_currentAudio.pause();}catch(e){}_currentAudio=null;}
  if('speechSynthesis' in window)speechSynthesis.cancel();
  
  // 方案1: Web Speech API（浏览器内置）
  if('speechSynthesis' in window){
    const voices=speechSynthesis.getVoices();
    const zhVoice=voices.find(v=>v.lang==='zh-CN'&&v.localService)||voices.find(v=>v.lang==='zh-CN')||voices.find(v=>v.lang.startsWith('zh'));
    
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.9;u.pitch=1.0;u.volume=1.0;
    if(zhVoice)u.voice=zhVoice;
    
    u.onstart=()=>setSpeakState(true);
    u.onend=()=>setSpeakState(false);
    u.onerror=(e)=>{console.error('SpeechAPI错误:',e.error);tryAudioTTS(text);};
    
    try{speechSynthesis.speak(u);return;}catch(e){console.error('SpeechAPI异常',e);}
  }
  
  // 方案2: Audio播放
  tryAudioTTS(text);
}

function tryAudioTTS(text){
  // 短词用有道TTS
  if(text.length<=10){
    const url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2';
    playAudioUrl(url);
    return;
  }
  // 长句拆分逐段播放
  const chunks=text.match(/.{1,8}/g)||[text];
  let idx=0;
  function playNext(){
    if(idx>=chunks.length){setSpeakState(false);return;}
    const url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(chunks[idx])+'&type=2';
    const a=new Audio(url);
    a.onended=()=>{idx++;playNext();};
    a.onerror=()=>{idx++;playNext();};
    a.play().catch(()=>{idx++;playNext();});
  }
  setSpeakState(true);
  playNext();
}

function playAudioUrl(url){
  setSpeakState(true);
  const a=new Audio(url);
  a.oncanplaythrough=()=>{_currentAudio=a;a.play().catch(()=>setSpeakState(false));};
  a.onended=()=>setSpeakState(false);
  a.onerror=()=>setSpeakState(false);
  a.load();
}

function setSpeakState(speaking){
  document.querySelectorAll('.btn-speak').forEach(b=>{
    if(speaking){b.classList.add('speaking');b.textContent=b.textContent.replace('🔊','⏹');}
    else{b.classList.remove('speaking');b.textContent=b.textContent.replace('⏹','🔊');}
  });
}

// 预加载voices
if('speechSynthesis' in window){
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
  speechSynthesis.getVoices();
}

// ============ UI ============
function speakResult(){const t=document.getElementById('resultArea').textContent;if(t)speakText(t);}
function speakInput(){const t=document.getElementById('inputText').value;if(t)speakText(t);}
function speakEl(id){const t=document.getElementById(id).textContent;if(t)speakText(t);}

let translateTimer=null;
function autoTranslate(){clearTimeout(translateTimer);translateTimer=setTimeout(doTranslate,300);}

function doTranslate(){
  const text=document.getElementById('inputText').value.trim();
  if(!text){document.getElementById('resultArea').textContent='翻译结果将显示在这里';document.getElementById('directionInfo').style.display='none';return;}
  const r=translate(text,false);
  document.getElementById('resultArea').textContent=r.result;
  document.getElementById('directionInfo').textContent=r.label;
  document.getElementById('directionInfo').style.display='inline-block';
}

function clearAll(){document.getElementById('inputText').value='';document.getElementById('resultArea').textContent='翻译结果将显示在这里';document.getElementById('directionInfo').style.display='none';}
function copyResult(){const t=document.getElementById('resultArea').textContent;navigator.clipboard.writeText(t).then(()=>showToast('已复制'));}

// ============ 语音识别 ============
let recognition=null,isRecording=false;
function toggleVoice(){if(isRecording){stopVoice();return;}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){showToast('请使用Chrome浏览器');return;}
recognition=new SR();recognition.lang='zh-CN';recognition.continuous=true;recognition.interimResults=true;
let finalT='';
recognition.onresult=function(e){let interim='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)finalT+=t;else interim+=t;}const cur=finalT+interim;if(cur){document.getElementById('voiceResultArea').style.display='block';document.getElementById('voiceASR').textContent=cur;const corr=correctASR(cur);if(corr!==cur){document.getElementById('voiceCorrectedCard').style.display='block';document.getElementById('voiceCorrected').textContent=corr;}else{document.getElementById('voiceCorrectedCard').style.display='none';}const r=translate(corr,false);document.getElementById('voiceTranslated').textContent=r.result;}};
recognition.onerror=function(e){stopVoice();};
recognition.onend=function(){if(isRecording)try{recognition.start();}catch(e){}};
try{recognition.start();isRecording=true;document.getElementById('micBtn').classList.add('recording');document.getElementById('micBtn').textContent='⏹';document.getElementById('voiceStatus').classList.add('active');}catch(e){showToast('语音识别启动失败');}
}

function stopVoice(){if(recognition){try{recognition.stop();}catch(e){}recognition=null;}isRecording=false;document.getElementById('micBtn').classList.remove('recording');document.getElementById('micBtn').textContent='🎤';document.getElementById('voiceStatus').classList.remove('active');const t=document.getElementById('voiceTranslated').textContent;if(t)setTimeout(()=>speakText(t),500);}

// ============ 快捷短语 ============
const QUICK=['你好','我俫今朝去哪块','多少钱','几钿','不知道','勿晓得','晚上吃什么','侯告吃什的','很厉害','蛮蛮结棍','帮忙','帮衬','回家','家去','漂亮','标致','很冷','蛮蛮瀴','聊天','搭寡'];
function initQuick(){const g=document.getElementById('quickPhrases');g.innerHTML=QUICK.map(p=>`<div class="quick-item" onclick="usePhrase('${p.replace(/'/g,"\\'")}')">${p}</div>`).join('');}
function usePhrase(t){document.getElementById('inputText').value=t;doTranslate();setTimeout(speakResult,200);}

function switchTab(n){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('panel-'+n).classList.add('active');event.target.classList.add('active');}

function showToast(m){const t=document.createElement('div');t.style.cssText='position:fixed;top:20%;left:50%;transform:translateX(-50%);background:rgba(0,210,211,0.9);color:#fff;padding:10px 24px;border-radius:20px;font-size:0.9em;z-index:9999';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

window.addEventListener('load',initQuick);
</script>
