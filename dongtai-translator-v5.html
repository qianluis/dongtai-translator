<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>东台方言实时翻译 - 语音版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }

        /* Header */
        .header {
            text-align: center;
            padding: 20px 0;
            color: white;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 13px; color: rgba(255,255,255,0.7); }

        /* Voice Card */
        .voice-card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Dialect Pills */
        .dialect-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .dialect-pill {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #e0e0e0;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dialect-pill.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        /* Mode Toggle */
        .mode-row {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        /* Voice Button */
        .voice-btn-wrap {
            position: relative;
            margin: 30px 0;
        }
        .voice-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(102,126,234,0.4);
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            user-select: none;
        }
        .voice-btn:active, .voice-btn.recording {
            transform: scale(0.95);
            background: linear-gradient(135deg, #f44336, #e91e63);
            box-shadow: 0 10px 40px rgba(244,67,54,0.4);
        }
        .voice-btn .icon { font-size: 48px; }
        .voice-btn .text { font-size: 14px; }

        /* Sound Waves Animation */
        .waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .wave {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #667eea;
            transform: translate(-50%, -50%);
            opacity: 0;
        }
        .wave.active {
            animation: wave 1.5s ease-out infinite;
        }
        .wave:nth-child(2) { animation-delay: 0.5s; }
        .wave:nth-child(3) { animation-delay: 1s; }

        @keyframes wave {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* Status */
        .status {
            padding: 12px 20px;
            border-radius: 20px;
            background: #f5f5f5;
            font-size: 14px;
            color: #666;
            display: inline-block;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .status.listening {
            background: linear-gradient(135deg, #ffebee, #fce4ec);
            color: #e91e63;
        }
        .status.thinking {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            color: #1976d2;
        }

        /* Transcript */
        .transcript {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
            min-height: 60px;
        }
        .transcript-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 6px;
        }
        .transcript-text {
            font-size: 18px;
            color: #333;
            line-height: 1.5;
        }
        .transcript-text.empty { color: #aaa; font-style: italic; }

        /* Result */
        .result {
            background: linear-gradient(135deg, #e8f0fe, #f3e5f5);
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border-left: 5px solid #667eea;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-label { font-size: 11px; color: #888; margin-bottom: 6px; }
        .result-text { font-size: 20px; color: #1a1a2e; font-weight: 600; }
        .result-translation {
            font-size: 16px;
            color: #667eea;
            margin-top: 10px;
        }
        .result-meta {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .meta-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(102,126,234,0.1);
            color: #667eea;
            border-radius: 12px;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .action-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .action-btn.primary:active { transform: scale(0.97); }
        .action-btn.secondary {
            background: #f0f0f0;
            color: #333;
        }
        .action-btn.speaking {
            background: #4caf50;
            color: white;
        }

        /* Text Mode */
        .text-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .text-input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Quick Phrases */
        .quick-phrases {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
            -webkit-overflow-scrolling: touch;
        }
        .quick-phrase {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-phrase:active {
            background: #667eea;
            color: white;
        }

        /* History */
        .history-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .history-item:last-child { border-bottom: none; }
        .history-time { font-size: 11px; color: #888; }
        .history-content { font-size: 14px; color: #333; margin: 5px 0; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 0 10px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab.active {
            background: white;
            color: #667eea;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 1000;
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Hidden */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ 东台方言翻译</h1>
            <p>按住说话 · 实时翻译 · 语音播报</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('voice')">🎤 语音</button>
            <button class="tab" onclick="switchTab('text')">⌨️ 文本</button>
            <button class="tab" onclick="switchTab('history')">📜 历史</button>
        </div>

        <!-- Voice Tab -->
        <div id="tab-voice" class="voice-card">
            <div class="dialect-row">
                <button class="dialect-pill active" onclick="setDialect('dongtai', this)">🏠 东台</button>
                <button class="dialect-pill" onclick="setDialect('funing', this)">📍 阜宁</button>
                <button class="dialect-pill" onclick="setDialect('dafeng', this)">📍 大丰</button>
            </div>

            <div class="mode-row">
                <button class="mode-btn active" onclick="setMode('d2m', this)">东台话 → 普通话</button>
                <button class="mode-btn" onclick="setMode('m2d', this)">普通话 → 东台话</button>
            </div>

            <div class="voice-btn-wrap">
                <div class="waves">
                    <div class="wave" id="wave1"></div>
                    <div class="wave" id="wave2"></div>
                    <div class="wave" id="wave3"></div>
                </div>
                <button class="voice-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="endVoice()" ontouchstart="startVoice()" ontouchend="endVoice()">
                    <span class="icon" id="voiceIcon">🎤</span>
                    <span class="text" id="voiceText">按住说话</span>
                </button>
            </div>

            <div class="status" id="status">准备就绪，请按住按钮说话</div>

            <div class="transcript">
                <div class="transcript-label" id="transcriptLabel">识别内容</div>
                <div class="transcript-text empty" id="transcriptText">等待语音输入...</div>
            </div>

            <div id="resultArea"></div>
        </div>

        <!-- Text Tab -->
        <div id="tab-text" class="voice-card hidden">
            <div class="dialect-row">
                <button class="dialect-pill active" onclick="setDialect('dongtai', this)">🏠 东台</button>
                <button class="dialect-pill" onclick="setDialect('funing', this)">📍 阜宁</button>
                <button class="dialect-pill" onclick="setDialect('dafeng', this)">📍 大丰</button>
            </div>

            <div class="mode-row">
                <button class="mode-btn active" onclick="setMode('d2m', this)">东台话 → 普通话</button>
                <button class="mode-btn" onclick="setMode('m2d', this)">普通话 → 东台话</button>
            </div>

            <input type="text" class="text-input" id="textInput" placeholder="输入东台话或普通话，如：你上哪块去呃？" oninput="translateText()">

            <div class="quick-phrases" id="quickPhrases"></div>

            <div id="textResult"></div>
        </div>

        <!-- History Tab -->
        <div id="tab-history" class="voice-card hidden">
            <h3 style="margin-bottom:15px;">📜 翻译历史</h3>
            <div id="historyList">
                <p style="color:#888;text-align:center;padding:40px;">暂无历史记录</p>
            </div>
        </div>
    </div>

    // ====== Init ======

    // ====== Tab Switching ======
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('tab-voice').classList.add('hidden');
        document.getElementById('tab-text').classList.add('hidden');
        document.getElementById('tab-history').classList.add('hidden');
        document.getElementById('tab-' + tab).classList.remove('hidden');

        if (tab === 'history') renderHistory();
    }

    // ====== Dialect Selection ======
    function setDialect(d, btn) {
        state.dialect = d;
        btn.parentElement.querySelectorAll('.dialect-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
    }

    // ====== Mode Selection ======
    function setMode(mode, btn) {
        state.mode = mode;
        btn.parentElement.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ====== Speech Recognition ======
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showToast('当前浏览器不支持语音识别，请使用Chrome');
            document.getElementById('voiceBtn').style.opacity = 0.5;
            return;
        }

        state.recognition = new SpeechRecognition();
        state.recognition.continuous = false;
        state.recognition.interimResults = true;
        state.recognition.lang = 'zh-CN';
        state.recognition.maxAlternatives = 1;

        state.recognition.onstart = () => {
            state.isRecording = true;
            updateVoiceUI(true);
            updateStatus('正在聆听...', 'listening');
        };

        state.recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            updateTranscript(transcript, !event.results[i-1].isFinal);

            if (event.results[i-1].isFinal) {
                processTranslation(transcript.trim());
            }
        };

        state.recognition.onerror = (event) => {
            console.error('Speech error:', event.error);
            stopRecording();
            if (event.error === 'no-speech') {
                updateStatus('未检测到语音，请重试', '');
            } else if (event.error === 'not-allowed') {
                updateStatus('请授权麦克风权限', '');
                showToast('请允许使用麦克风');
            } else {
                updateStatus('识别出错: ' + event.error, '');
            }
        };

        state.recognition.onend = () => {
            stopRecording();
        };
    }

    function startVoice() {
        if (!state.recognition) {
            initSpeechRecognition();
        }
        if (state.recognition && !state.isRecording) {
            try {
                state.recognition.start();
            } catch(e) {
                console.error('Recognition start error:', e);
            }
        }
    }

    function endVoice() {
        if (state.recognition && state.isRecording) {
            state.recognition.stop();
        }
    }

    function stopRecording() {
        state.isRecording = false;
        updateVoiceUI(false);
    }

    // ====== UI Updates ======
    function updateVoiceUI(recording) {
        const btn = document.getElementById('voiceBtn');
        const icon = document.getElementById('voiceIcon');
        const text = document.getElementById('voiceText');
        const waves = document.querySelectorAll('.wave');

        if (recording) {
            btn.classList.add('recording');
            icon.textContent = '🎙️';
            text.textContent = '录音中...';
            waves.forEach(w => w.classList.add('active'));
        } else {
            btn.classList.remove('recording');
            icon.textContent = '🎤';
            text.textContent = '按住说话';
            waves.forEach(w => w.classList.remove('active'));
        }
    }

    function updateStatus(text, type) {
        const el = document.getElementById('status');
        el.textContent = text;
        el.className = 'status' + (type ? ' ' + type : '');
    }

    function updateTranscript(text, interim) {
        const el = document.getElementById('transcriptText');
        el.textContent = text || '等待语音输入...';
        el.className = 'transcript-text' + (text ? '' : ' empty');
        document.getElementById('transcriptLabel').textContent = interim ? '识别中...' : '识别内容';
    }

    function showResult(result) {
        const area = document.getElementById('resultArea');
        area.innerHTML = `
            <div class="result">
                <div class="result-label">${state.mode === 'd2m' ? '东台话' : '普通话'}</div>
                <div class="result-text">${result.original}</div>
                <div class="result-label" style="margin-top:10px;">${state.mode === 'd2m' ? '普通话' : '东台话'}</div>
                <div class="result-translation">${result.translated}</div>
                <div class="result-meta">
                    <span class="meta-tag">${result.category}</span>
                </div>
                <div class="action-row">
                    <button class="action-btn primary" onclick="speakText('${(state.mode === 'd2m' ? result.translated : result.original).replace(/'/g, "\\'")}')">
                        🔊 播放
                    </button>
                    <button class="action-btn secondary" onclick="copyResult('${(state.mode === 'd2m' ? result.translated : result.original).replace(/'/g, "\\'")}')">
                        📋 复制
                    </button>
                </div>
            </div>
        `;
    }

    // ====== Translation Engine ======
    function processTranslation(text) {
        if (!text) {
            updateStatus('无法识别，请重试', '');
            return;
        }

        updateStatus('正在翻译...', 'thinking');

        // Simulate slight delay for natural feel
        setTimeout(() => {
            const result = findBestMatch(text);
            showResult(result);
            addToHistory(result);
            updateStatus('翻译完成', '');

            // Auto speak
            speakText(state.mode === 'd2m' ? result.translated : result.original);
        }, 100);
    }

    function findBestMatch(text) {
        const searchField = state.mode === 'd2m' ? 'd' : 'm';
        const matchField = state.mode === 'd2m' ? 'm' : 'd';
        const lower = text.toLowerCase().trim();

        // 1. Exact match
        for (const item of CORPUS) {
            if (item[searchField].toLowerCase() === lower) {
                return { original: item.d, translated: item.m, category: item.c };
            }
        }

        // 2. Contains match (highest score)
        let best = null;
        let bestScore = 0;

        for (const item of CORPUS) {
            const target = item[searchField].toLowerCase();
            let score = 0;
            let matchCount = 0;

            for (const char of lower) {
                if (target.includes(char)) matchCount++;
            }

            if (matchCount > 0) {
                score = matchCount / Math.max(target.length, lower.length);

                // Bonus for matching words
                if (target.includes(lower)) score += 0.3;

                // Bonus for similar length
                if (Math.abs(target.length - lower.length) < 3) score += 0.2;

                if (score > bestScore) {
                    bestScore = score;
                    best = { original: item.d, translated: item.m, category: item.c };
                }
            }
        }

        if (best && bestScore > 0.3) {
            return best;
        }

        // 3. Return input with best guess
        return {
            original: text,
            translated: text, // Return as-is if no match
            category: '未分类'
        };
    }

    // ====== Text Translation ======
    function translateText() {
        const text = document.getElementById('textInput').value.trim();
        if (!text) {
            document.getElementById('textResult').innerHTML = '';
            return;
        }

        const result = findBestMatch(text);
        document.getElementById('textResult').innerHTML = `
            <div class="result">
                <div class="result-label">${state.mode === 'd2m' ? '东台话' : '普通话'}</div>
                <div class="result-text">${result.original}</div>
                <div class="result-label" style="margin-top:10px;">${state.mode === 'd2m' ? '普通话' : '东台话'}</div>
                <div class="result-translation">${result.translated}</div>
                <div class="result-meta">
                    <span class="meta-tag">${result.category}</span>
                </div>
                <div class="action-row">
                    <button class="action-btn primary" onclick="speakText('${(state.mode === 'd2m' ? result.translated : result.original).replace(/'/g, "\\'")}')">
                        🔊 播放
                    </button>
                </div>
            </div>
        `;

        addToHistory(result);
    }

    // ====== Quick Phrases ======
    function initQuickPhrases() {
        const container = document.getElementById('quickPhrases');
        container.innerHTML = QUICK_PHRASES.map(p =>
            `<button class="quick-phrase" onclick="usePhrase('${p}')">${p}</button>`
        ).join('');
    }

    function usePhrase(text) {
        document.getElementById('textInput').value = text;
        translateText();
    }

    // ====== Text to Speech ======
    function speakText(text) {
        if (!text || !('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9;
        utterance.pitch = 1;

        const btn = document.querySelector('.action-btn.speaking');
        if (btn) btn.classList.add('speaking');

        utterance.onend = () => {
            const btns = document.querySelectorAll('.action-btn');
            btns.forEach(b => b.classList.remove('speaking'));
        };

        window.speechSynthesis.speak(utterance);
    }

    function copyResult(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast('已复制到剪贴板');
        }).catch(() => {
            showToast('复制失败');
        });
    }

    // ====== History ======
    function addToHistory(result) {
        state.history.unshift({
            time: new Date().toLocaleTimeString(),
            ...result
        });
        if (state.history.length > 50) state.history.pop();
        localStorage.setItem('dt_history', JSON.stringify(state.history));
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (state.history.length === 0) {
            list.innerHTML = '<p style="color:#888;text-align:center;padding:40px;">暂无历史记录</p>';
            return;
        }
        list.innerHTML = state.history.map(h => `
            <div class="history-item">
                <div class="history-time">${h.time}</div>
                <div class="history-content">${h.original} → ${h.translated}</div>
                <span class="meta-tag">${h.category}</span>
            </div>
        `).join('');
    }

    // ====== Toast ======
    function showToast(msg) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();

        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);

        setTimeout(() => toast.remove(), 2500);
    }
