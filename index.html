<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
#canvas-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

/* Top bar */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: linear-gradient(180deg, rgba(10,14,26,0.95) 0%, rgba(10,14,26,0) 100%);
  padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
}
.top-bar h1 { font-size: 20px; font-weight: 700; }
.top-bar h1 span { color: #4caf50; }

/* Formation selector */
.formation-panel {
  position: fixed; left: 16px; top: 50%; transform: translateY(-50%); z-index: 100;
  display: flex; flex-direction: column; gap: 8px;
}
.formation-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; padding: 10px 16px; border-radius: 8px; cursor: pointer;
  font-size: 13px; transition: all 0.3s; text-align: left; backdrop-filter: blur(10px);
}
.formation-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
.formation-btn.active { background: rgba(76,175,80,0.2); border-color: #4caf50; color: #4caf50; }
.formation-btn .era { font-size: 10px; color: #888; display: block; margin-top: 2px; }
.formation-btn.active .era { color: #4caf50; }

/* Info panel */
.info-panel {
  position: fixed; right: 16px; top: 50%; transform: translateY(-50%); z-index: 100;
  width: 280px; background: rgba(10,14,26,0.9); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 20px; backdrop-filter: blur(20px);
  transition: all 0.5s;
}
.info-panel h2 { font-size: 18px; margin-bottom: 4px; }
.info-panel .subtitle { color: #888; font-size: 12px; margin-bottom: 12px; }
.info-panel .desc { font-size: 13px; line-height: 1.6; color: #ccc; margin-bottom: 12px; }
.info-panel .tag { display: inline-block; background: rgba(76,175,80,0.15); color: #4caf50;
  padding: 2px 10px; border-radius: 12px; font-size: 11px; margin: 2px; }
.info-panel .stat { display: flex; justify-content: space-between; padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
.info-panel .stat .val { color: #4caf50; font-weight: 600; }

/* Brain mode panel */
.brain-panel {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
  display: flex; gap: 12px; background: rgba(10,14,26,0.9); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 12px 20px; backdrop-filter: blur(20px);
}
.brain-mode {
  display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer;
  padding: 6px 12px; border-radius: 8px; transition: all 0.3s;
}
.brain-mode:hover { background: rgba(255,255,255,0.05); }
.brain-mode .icon { font-size: 20px; }
.brain-mode .label { font-size: 10px; color: #888; }
.brain-mode.active .label { color: #4caf50; }

/* Controls hint */
.hint {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 100;
  color: #555; font-size: 11px;
}

/* Toggle button */
.view-toggle {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer;
  font-size: 12px; backdrop-filter: blur(10px);
}
.view-toggle:hover { background: rgba(255,255,255,0.15); }

// ========== Pitch ==========
function createPitch() {
  const group = new THREE.Group();
  
  // Pitch surface
  const pitchGeo = new THREE.PlaneGeometry(68, 105);
  const pitchMat = new THREE.MeshStandardMaterial({ 
    color: 0x1a5c2a, roughness: 0.9, metalness: 0.1 
  });
  const pitch = new THREE.Mesh(pitchGeo, pitchMat);
  pitch.rotation.x = -Math.PI / 2;
  pitch.receiveShadow = true;
  group.add(pitch);
  
  // Pitch lines
  const lineMat = new THREE.LineBasicMaterial({ color: 0x3da35d, linewidth: 1 });
  
  // Outline
  const outlineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-34, 0.05, -52.5), new THREE.Vector3(34, 0.05, -52.5),
    new THREE.Vector3(34, 0.05, 52.5), new THREE.Vector3(-34, 0.05, 52.5),
    new THREE.Vector3(-34, 0.05, -52.5)
  ]);
  group.add(new THREE.Line(outlineGeo, lineMat));
  
  // Center line
  const clGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-34, 0.05, 0), new THREE.Vector3(34, 0.05, 0)
  ]);
  group.add(new THREE.Line(clGeo, lineMat));
  
  // Center circle
  const ccGeo = new THREE.RingGeometry(9, 9.15, 64);
  const ccMat = new THREE.MeshBasicMaterial({ color: 0x3da35d, side: THREE.DoubleSide });
  const cc = new THREE.Mesh(ccGeo, ccMat);
  cc.rotation.x = -Math.PI / 2;
  cc.position.y = 0.05;
  group.add(cc);
  
  // Grid lines for JdP (subtle)
  for (let i = -2; i <= 2; i++) {
    const gGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-34, 0.03, i * 21), new THREE.Vector3(34, 0.03, i * 21)
    ]);
    const gLine = new THREE.Line(gGeo, new THREE.LineBasicMaterial({ color: 0x224422, transparent: true, opacity: 0.3 }));
    gLine.visible = false;
    gLine.userData.isGrid = true;
    group.add(gLine);
  }
  
  return group;
}

const pitchGroup = createPitch();
scene.add(pitchGroup);

// ========== Player Creation ==========

function createPlayer(x, z, color, label = '', isGK = false) {
  const group = new THREE.Group();
  
  // Body - cylinder
  const bodyGeo = new THREE.CylinderGeometry(0.8, 0.8, 2.5, 16);
  const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 1.25;
  body.castShadow = true;
  group.add(body);
  
  // Head - sphere
  const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.5 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 3;
  head.castShadow = true;
  group.add(head);
  
  // Base ring
  const ringGeo = new THREE.RingGeometry(0.9, 1.2, 32);
  const ringMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.05;
  group.add(ring);
  
  // Direction arrow
  const arrowGeo = new THREE.ConeGeometry(0.3, 0.8, 8);
  const arrowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 });
  const arrow = new THREE.Mesh(arrowGeo, arrowMat);
  arrow.position.set(0, 1.5, -1.5);
  arrow.rotation.x = Math.PI / 2;
  group.add(arrow);
  
  group.position.set(x, 0, z);
  group.userData = { label, isGK, baseX: x, baseZ: z };
  
  return group;
}

// ========== Load Formation ==========
function loadFormation(key) {
  currentFormation = key;
  const f = formations[key];
  
  // Clear
  while (playerGroup.children.length) playerGroup.remove(playerGroup.children[0]);
  while (arrowGroup.children.length) arrowGroup.remove(arrowGroup.children[0]);
  while (passingNetGroup.children.length) passingNetGroup.remove(passingNetGroup.children[0]);
  playerMeshes = [];
  
  // Create players
  f.players.forEach((p, i) => {
    const player = createPlayer(p.x, p.z, p.color, p.label, p.gk);
    playerGroup.add(player);
    playerMeshes.push(player);
  });
  
  // Create passing network
  updatePassingNet();
  
  // Create movement arrows
  updateMovementArrows();
  
  // Toggle grid
  pitchGroup.children.forEach(c => {
    if (c.userData && c.userData.isGrid) c.visible = f.showGrid;
  });
  
  // Update UI
  updateInfoPanel(f);
  
  // Update buttons
  document.querySelectorAll('.formation-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.key === key);
  });
  
  // Camera animation
  animateCamera(key);
}

function updatePassingNet() {
  while (passingNetGroup.children.length) passingNetGroup.remove(passingNetGroup.children[0]);
  if (!showPassingNet) return;
  
  const f = formations[currentFormation];
  f.passingPairs.forEach(([a, b]) => {
    const pa = f.players[a], pb = f.players[b];
    const points = [
      new THREE.Vector3(pa.x, 0.5, pa.z),
      new THREE.Vector3(pb.x, 0.5, pb.z)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ 
      color: f.color, transparent: true, opacity: 0.35, linewidth: 1 
    });
    passingNetGroup.add(new THREE.Line(geo, mat));
    
    // Midpoint glow
    const mid = new THREE.Vector3((pa.x+pb.x)/2, 0.5, (pa.z+pb.z)/2);
    const glowGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const glowMat = new THREE.MeshBasicMaterial({ color: f.color, transparent: true, opacity: 0.4 });
    passingNetGroup.add(new THREE.Mesh(glowGeo, glowMat).translateX(mid.x).translateY(mid.y).translateZ(mid.z));
  });
}

function updateMovementArrows() {
  while (arrowGroup.children.length) arrowGroup.remove(arrowGroup.children[0]);
  if (!showMovement) return;
  
  const f = formations[currentFormation];
  f.movementPaths.forEach(([from, to]) => {
    const pa = f.players[from], pb = f.players[to];
    const from3 = new THREE.Vector3(pa.x, 0.8, pa.z);
    const to3 = new THREE.Vector3(pb.x, 0.8, pb.z);
    const dir = new THREE.Vector3().subVectors(to3, from3).normalize();
    const arrow = new THREE.ArrowHelper(dir, from3, from3.distanceTo(to3), 0xcc44ff, 1.5, 0.8);
    arrowGroup.add(arrow);
  });
}

function animateCamera(key) {
  const target = { x: 0, y: 60, z: 60 };
  if (key === 'cuju') { target.y = 50; target.z = 50; }
  if (key === 'jdp') { target.y = 70; target.z = 70; }
  
  const start = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
  const duration = 1000;
  const startTime = Date.now();
  
  function tick() {
    const t = Math.min(1, (Date.now() - startTime) / duration);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    camera.position.x = start.x + (target.x - start.x) * ease;
    camera.position.y = start.y + (target.y - start.y) * ease;
    camera.position.z = start.z + (target.z - start.z) * ease;
    if (t < 1) requestAnimationFrame(tick);
  }
  tick();
}

function updateInfoPanel(f) {
  document.getElementById('infoTitle').textContent = f.name;
  document.getElementById('infoSubtitle').textContent = f.subtitle;
  document.getElementById('infoDesc').textContent = f.desc;
  
  const tagsEl = document.getElementById('infoTags');
  tagsEl.innerHTML = f.tags.map(t => `<span class="tag">${t}</span>`).join('');
  
  const statsEl = document.getElementById('infoStats');
  statsEl.innerHTML = Object.entries(f.stats).map(([k, v]) => 
    `<div class="stat"><span>${k}</span><span class="val">${'●'.repeat(v)}${'○'.repeat(10-v)}</span></div>`
  ).join('');
}

// ========== Global Functions ==========
window.togglePassingNet = () => { showPassingNet = !showPassingNet; updatePassingNet(); };
window.toggleMovement = () => { showMovement = !showMovement; updateMovementArrows(); };
window.toggleBrainView = () => { currentBrainMode = currentBrainMode ? null : 'scanning'; };
window.setBrainMode = (mode) => {
  currentBrainMode = currentBrainMode === mode ? null : mode;
  document.querySelectorAll('.brain-mode').forEach(el => {
    el.classList.toggle('active', el.dataset.mode === currentBrainMode);
  });
};

// ========== Build Formation Buttons ==========
const panelEl = document.getElementById('formationPanel');
Object.keys(formations).forEach(key => {
  const f = formations[key];
  const btn = document.createElement('button');
  btn.className = 'formation-btn';
  btn.dataset.key = key;
  const era = f.subtitle.match(/\(([^)]+)\)/)?.[1] || '';
  btn.innerHTML = `${f.name}<span class="era">${era}</span>`;
  btn.onclick = () => loadFormation(key);
  panelEl.appendChild(btn);
});

// ========== Animation Loop ==========
function animate() {
  requestAnimationFrame(animate);
  animationTime += 0.01;
  controls.update();
  
  // Player hover animation
  playerMeshes.forEach((p, i) => {
    p.position.y = Math.sin(animationTime * 2 + i * 0.5) * 0.15;
    
    // Brain mode effects
    if (currentBrainMode === 'scanning') {
      p.rotation.y = Math.sin(animationTime * 3 + i) * 0.5; // Head scanning
    } else if (currentBrainMode === 'anticipation') {
      // Slight lean forward
      p.children[0].rotation.x = Math.sin(animationTime * 2 + i) * 0.1;
    }
  });
  
  // Passing net pulse
  passingNetGroup.children.forEach((child, i) => {
    if (child.material && child.material.opacity !== undefined) {
      child.material.opacity = 0.2 + 0.15 * Math.sin(animationTime * 3 + i * 0.3);
    }
  });
  
  // Point light color
  const f = formations[currentFormation];
  pointLight.color.setHex(f.color);
  
  renderer.render(scene, camera);
}

// ========== Resize ==========
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ========== Init ==========
loadFormation('tikitaka');
animate();
</script>
</body>
