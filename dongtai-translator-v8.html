function applyRules(text,rules){let r=text;for(const[f,t]of rules){r=r.replace(new RegExp(f,'g'),t);}return r;}

let debounceTimer;
function realtimeTranslate(dir){
clearTimeout(debounceTimer);
debounceTimer=setTimeout(()=>translate(dir),300);
}

function translate(dir){
if(dir==='m2d'){
const input=document.getElementById('inputMandarin').value.trim();
if(!input)return;
const result=applyRules(input,R_M2D);
document.getElementById('resultDialect').innerHTML=`<span class="highlight">${result}</span>`;
}else{
const input=document.getElementById('inputDialect').value.trim();
if(!input)return;
const result=applyRules(input,R_D2M);
document.getElementById('resultMandarin').innerHTML=`<span class="highlight">${result}</span>`;
}
}

function clearField(inputId,resultId){
document.getElementById(inputId).value='';
document.getElementById(resultId).innerHTML='';
}

// Speech Synthesis
function speak(resultId){
const el=document.getElementById(resultId);
const text=el.textContent||el.innerText;
if(!text||text===el.getAttribute('data-empty'))return;
const u=new SpeechSynthesisUtterance(text);
u.lang='zh-CN';u.rate=0.9;
speechSynthesis.speak(u);
}

// Voice Recognition
let recognition=null;let isRecording=false;
function toggleVoice(){
if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
alert('您的浏览器不支持语音识别，请使用Chrome浏览器');return;
}
if(isRecording){stopVoice();return;}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
recognition=new SR();recognition.lang='zh-CN';recognition.continuous=false;recognition.interimResults=true;
recognition.onresult=function(e){
let t='';for(let i=e.resultIndex;i<e.results.length;i++){t+=e.results[i][0].transcript;}
document.getElementById('voiceResult').innerHTML=`<p><b>识别：</b>${t}</p><p><b>方言：</b><span class="highlight">${applyRules(t,R_M2D)}</span></p>`;
};
recognition.onerror=function(e){stopVoice();};
recognition.onend=function(){if(isRecording)stopVoice();};
recognition.start();isRecording=true;
document.getElementById('voiceBtn').textContent='⏹ 停止录音';document.getElementById('voiceBtn').classList.add('recording');
document.getElementById('voiceStatus').classList.add('active');
}
function stopVoice(){
if(recognition){recognition.stop();recognition=null;}
isRecording=false;
document.getElementById('voiceBtn').textContent='🎤 开始录音';document.getElementById('voiceBtn').classList.remove('recording');
document.getElementById('voiceStatus').classList.remove('active');
}

function switchTab(name){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('panel-'+name).classList.add('active');
}

function initCategories(){
const grid=document.getElementById('catGrid');
const icons={'生存刚需':'🏠','政务办事':'🏛️','社交融入':'🤝','职场沟通':'💼','医疗健康':'🏥','文化生活':'🎭','方言文化':'📖'};
grid.innerHTML='';
for(const[cat,total]of Object.entries(STATS.categories)){
const card=document.createElement('div');card.className='cat-card';
card.innerHTML=`<div class="cat-icon">${icons[cat]||'📌'}</div><div class="cat-name">${cat}</div><div class="cat-count">${total.toLocaleString()}条</div>`;
card.onclick=()=>showCatSamples(cat);grid.appendChild(card);
}
}
function showCatSamples(cat){
const samples=SAMPLES.filter(s=>s.c===cat);
document.getElementById('corpusResults').innerHTML=samples.map(s=>`<div class="sample-item"><div class="s-dialect">🗣️ ${s.d}</div><div class="s-mandarin">➡️ ${s.m}</div><div class="s-meta"><span class="s-tag">${s.c}</span><span class="s-tag">${s.sc}</span></div></div>`).join('');
}
function searchCorpus(){
const q=document.getElementById('corpusSearch').value.trim().toLowerCase();
if(!q){document.getElementById('corpusResults').innerHTML='';return;}
const m=SAMPLES.filter(s=>s.d.includes(q)||s.m.includes(q));
document.getElementById('corpusResults').innerHTML=m.length?m.map(s=>`<div class="sample-item"><div class="s-dialect">🗣️ ${s.d}</div><div class="s-mandarin">➡️ ${s.m}</div><div class="s-meta"><span class="s-tag">${s.c}</span><span class="s-tag">${s.sc}</span></div></div>`).join(''):'<p style="color:var(--muted);text-align:center;padding:16px">未找到匹配</p>';
}
function initVocab(){
document.getElementById('vocabGrid').innerHTML=VOCAB.map(v=>`<div class="vocab-card"><span class="v-dialect">${v.d}</span> → <span class="v-mandarin">${v.m}</span><div class="v-freq">出现 ${v.f.toLocaleString()} 次</div></div>`).join('');
}
function filterVocab(){
const q=document.getElementById('vocabSearch').value.trim().toLowerCase();
const f=VOCAB.filter(v=>v.d.includes(q)||v.m.includes(q));
document.getElementById('vocabGrid').innerHTML=f.map(v=>`<div class="vocab-card"><span class="v-dialect">${v.d}</span> → <span class="v-mandarin">${v.m}</span><div class="v-freq">出现 ${v.f.toLocaleString()} 次</div></div>`).join('');
}
initCategories();initVocab();
