<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>东台方言翻译 - 语音+文字</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;
            background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
            min-height:100vh;overflow-x:hidden;color:#333}
        .container{max-width:520px;margin:0 auto;padding:12px;padding-bottom:80px}
        .header{text-align:center;padding:12px 0 6px}
        .header h1{font-size:24px;background:linear-gradient(135deg,#f5af19,#f12711);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header p{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}
        .card{background:white;border-radius:20px;padding:16px;margin:10px 0;
            box-shadow:0 8px 24px rgba(0,0,0,0.2)}
        .mode-row{display:flex;gap:8px;margin-bottom:12px}
        .mode-btn{flex:1;padding:10px;border-radius:12px;border:2px solid #eee;
            background:white;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
        .mode-btn.active{border-color:#f5af19;background:linear-gradient(135deg,#f5af19,#f12711);color:white}
        .input-wrap{position:relative;margin-bottom:8px}
        .input-box{width:100%;min-height:70px;padding:12px 50px 12px 12px;
            border:2px solid #eee;border-radius:14px;font-size:17px;line-height:1.5;
            resize:none;font-family:inherit;transition:border-color .2s}
        .input-box:focus{outline:none;border-color:#f5af19}
        .input-box::placeholder{color:#bbb;font-size:14px}
        .voice-btn{position:absolute;right:8px;bottom:8px;width:38px;height:38px;
            border-radius:50%;border:none;background:linear-gradient(135deg,#f5af19,#f12711);
            color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;
            justify-content:center;transition:all .2s}
        .voice-btn.recording{background:#e91e63;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        .translate-btn{width:100%;padding:12px;border-radius:12px;border:none;
            background:linear-gradient(135deg,#f5af19,#f12711);color:white;
            font-size:15px;font-weight:600;cursor:pointer}
        .translate-btn:active{transform:scale(.98)}
        .hint-box{background:#fff3e0;border-radius:10px;padding:8px 10px;
            margin-bottom:8px;font-size:12px;color:#e65100;line-height:1.5}
        .hint-box b{color:#d84315}
        .result-box{background:linear-gradient(135deg,#fff8e1,#fff3e0);border-radius:14px;
            padding:14px;margin-top:10px;border-left:4px solid #f5af19;
            animation:slideIn .3s ease}
        @keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .result-label{font-size:11px;color:#999;margin-bottom:3px}
        .result-text{font-size:20px;color:#1a1a2e;font-weight:600;line-height:1.5}
        .result-dialect{font-size:18px;color:#e65100;margin-top:6px;font-weight:500}
        .result-meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
        .meta-tag{font-size:11px;padding:3px 8px;background:rgba(245,175,25,.15);
            color:#e65100;border-radius:8px}
        .confidence{font-size:11px}
        .confidence.high{color:#4caf50}
        .confidence.medium{color:#ff9800}
        .confidence.low{color:#f44336}
        .result-actions{display:flex;gap:6px;margin-top:10px}
        .action-btn{flex:1;padding:8px;border-radius:10px;border:none;
            font-size:13px;cursor:pointer;display:flex;align-items:center;
            justify-content:center;gap:4px}
        .action-btn.primary{background:#f5af19;color:white}
        .action-btn.secondary{background:#f0f0f0;color:#666}
        .quick-title{font-size:12px;color:#999;margin:10px 0 6px}
        .quick-grid{display:flex;flex-wrap:wrap;gap:6px}
        .quick-chip{padding:5px 12px;background:#f5f5f5;border-radius:14px;
            font-size:12px;cursor:pointer;border:none}
        .quick-chip:active{background:#f5af19;color:white}
        .tabs{display:flex;gap:6px;margin:8px 0}
        .tab-btn{flex:1;padding:8px;border-radius:10px;border:none;
            background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);
            font-size:13px;font-weight:600;cursor:pointer}
        .tab-btn.active{background:white;color:#e65100}
        .dict-section{margin-bottom:12px}
        .dict-title{font-size:14px;font-weight:600;margin-bottom:6px;color:#e65100}
        .dict-table{width:100%;font-size:13px}
        .dict-table td{padding:3px 6px}
        .dict-table td:first-child{color:#e65100;font-weight:500;white-space:nowrap}
        .dict-table td:last-child{color:#666}
        .history-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
        .history-item:last-child{border:none}
        .history-time{font-size:11px;color:#bbb}
        .history-pair{font-size:13px;margin-top:3px}
        .history-pair .arrow{color:#f5af19;margin:0 4px}
        .hidden{display:none!important}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
            background:rgba(0,0,0,.85);color:white;padding:10px 20px;
            border-radius:20px;font-size:14px;z-index:1000}
        .status-bar{background:#e8f5e9;border-radius:8px;padding:6px 10px;
            margin-bottom:8px;font-size:12px;color:#2e7d32;display:flex;align-items:center;gap:6px}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🗣️ 东台方言翻译</h1>
        <p>普通话↔东台话 · 语音播报 · 即时翻译</p>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('translate')">🔄 翻译</button>
        <button class="tab-btn" onclick="switchTab('dict')">📖 词典</button>
        <button class="tab-btn" onclick="switchTab('history')">📜 历史</button>
    </div>

    <div id="tab-translate">
        <div class="card">
            <div id="statusBar" class="status-bar">
                <span class="status-dot"></span>
                <span id="statusText">准备就绪</span>
            </div>

            <div class="mode-row">
                <button class="mode-btn active" id="modeM2D" onclick="setMode('m2d')">普通话 → 东台话</button>
                <button class="mode-btn" id="modeD2M" onclick="setMode('d2m')">东台话 → 普通话</button>
            </div>

            <div class="hint-box" id="hintBox">
                💡 点<b>🎤</b>说普通话→自动翻译为东台话。东台话建议<b>文字输入</b>更准。
            </div>

            <div class="input-wrap">
                <textarea class="input-box" id="inputBox"
                    placeholder="输入普通话，如：你去哪里？"
                    oninput="onInput()"></textarea>
                <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🎤</button>
            </div>

            <button class="translate-btn" onclick="doTranslate()">🔄 翻译</button>
            <div id="resultArea"></div>

            <div class="quick-title">💡 常用短句</div>
            <div class="quick-grid" id="quickGrid"></div>
        </div>
    </div>

    <div id="tab-dict" class="hidden"><div class="card" id="dictContent"></div></div>
    <div id="tab-history" class="hidden">
        <div class="card">
            <h3 style="margin-bottom:10px">📜 翻译历史</h3>
            <div id="historyList"><p style="color:#999;text-align:center;padding:20px">暂无历史</p></div>
        </div>
    </div>
</div>

<script>
// ============================================================
// 东台方言翻译引擎 v8 - 彻底修复三大硬伤
// 1. 语音识别后立即自动翻译
// 2. TTS确保中文语音播报
// 3. 方言识别大幅增强纠错
// ============================================================

const S = {
    mode: 'm2d',
    isRecording: false,
    recognition: null,
    history: JSON.parse(localStorage.getItem('dt_h') || '[]'),
    chineseVoice: null,  // 缓存中文语音
};

// ===== 150+ 词汇映射 =====
const M2D = {
    '不知道':'弗晓得','多少钱':'几钿','什么时候':'什的时辰',
    '聊天':'讲白相','吵架':'相骂','回家':'家去','洗澡':'汏浴',
    '舒服':'适意','着急':'心焦','厉害':'来斯','东西':'杲昃',
    '晚饭':'夜饭','午饭':'中饭','鸡蛋':'鸡子',
    '我们':'我俦','你们':'你俦','他们':'他俦','她们':'他俦',
    '哪里':'哪块','什么':'什的','怎么':'怎呃',
    '爷爷':'爹爹','孩子':'伢儿','妻子':'女将','丈夫':'男将',
    '老师':'先生','邻居':'邻舍','老人':'老人家',
    '不好':'弗好','不行':'弗行','不会':'弗会','不能':'弗能',
    '不是':'弗是','不要':'弗要','不用':'弗用',
    '不要紧':'呒得事','没关系':'呒得事',
    '今天':'今呃','明天':'明呃','昨天':'昨呃',
    '后天':'后呃','前天':'前呃',
    '早上':'早起头','中午':'中上','下午':'下半日','晚上':'夜头',
    '现在':'眼下','以前':'老早','刚才':'才将','以后':'往后','每天':'日日',
    '睡觉':'困觉','差':'推板','利索':'刷刮','实在':'扎实',
    '聪明':'灵光','笨':'木作','漂亮':'标致',
    '干净':'清爽','脏':'龌龊',
    '上面':'高头','下面':'底下','里面':'里头','外面':'外头',
    '前面':'前头','后面':'后头','对面':'对过','旁边':'边头',
    '找':'寻','洗':'汏','穿':'着','看':'望','说':'讲',
    '跑':'奔','站':'立','蹲':'跍','扔':'掼','拿':'担',
    '放':'搁','藏':'囥','玩':'耍','给':'把','很':'蛮',
    '非常':'蛮','太':'蛮','没有':'呒得','不':'弗',
};

const D2M = {};
for (const [m, d] of Object.entries(M2D)) {
    if (d !== m && !D2M[d]) D2M[d] = m;
}
Object.assign(D2M, {
    '弗':'不','呒得':'没有','哪块':'哪里','什的':'什么','怎呃':'怎么',
    '几钿':'多少钱','杲昃':'东西','来斯':'厉害','推板':'差','扎实':'实在',
    '刷刮':'利索','家去':'回家','我俦':'我们','你俦':'你们','他俦':'他们',
    '爹爹':'爷爷','伢儿':'孩子','女将':'妻子','先生':'老师','邻舍':'邻居',
    '汏':'洗','着':'穿','望':'看','寻':'找','讲':'说','奔':'跑','立':'站',
    '蛮':'很','呃':'了','今呃':'今天','明呃':'明天','昨呃':'昨天',
    '早起头':'早上','中上':'中午','夜头':'晚上','眼下':'现在','老早':'以前',
    '日日':'每天','鸡子':'鸡蛋','困觉':'睡觉','讲白相':'聊天','适意':'舒服',
    '心焦':'着急','相骂':'吵架','清爽':'干净','龌龊':'脏','灵光':'聪明',
    '标致':'漂亮','木作':'笨','夜饭':'晚饭','中饭':'午饭',
});

// ===== 方言语音纠错表（大幅扩展）=====
// 浏览器ASR说方言时的常见误识别→纠正为正确方言词
const SPEECH_FIX = {
    // 核心特征词纠错
    '什地':'什的','神的':'什的','甚的':'什的','十地':'什的','实地':'什的',
    '哪块':'哪块','哪快':'哪块','那块':'哪块','拉块':'哪块',
    '几钿':'几钿','几点':'几钿','几钱':'几钿','几店':'几钿','几电':'几钿',
    '搞子':'杲昃','高子':'杲昃','稿子':'杲昃','告子':'杲昃','搞资':'杲昃',
    '来斯':'来斯','赖斯':'来斯','来死':'来斯','来四':'来斯',
    '推板':'推板','腿板':'推板','退板':'推板',
    '扎实':'扎实','炸石':'扎实','咋实':'扎实',
    '刷刮':'刷刮','耍瓜':'刷刮','刷瓜':'刷刮',
    '我仇':'我俦','我凑':'我俦','我愁':'我俦','我抽':'我俦','我周':'我俦',
    '你仇':'你俦','你凑':'你俦','你愁':'你俦','你抽':'你俦',
    '他仇':'他俦','他凑':'他俦','他愁':'他俦','他抽':'他俦',
    '爹爹':'爹爹','迭迭':'爹爹','跌跌':'爹爹',
    '丫头':'伢儿','牙儿':'伢儿','牙人':'伢儿','亚儿':'伢儿',
    '大雨':'汏浴','大浴':'汏浴','达宇':'汏浴',
    '家去':'家去','下去':'家去','架去':'家去',
    '佛':'弗','否':'弗','服':'弗',
    '木得':'呒得','没得':'呒得','么得':'呒得','莫得':'呒得',
    '满':'蛮','慢':'蛮',
    '困觉':'困觉','睡觉':'困觉','捆角':'困觉',
    // 时间词纠错
    '今儿':'今呃','今额':'今呃','金额':'今呃','金儿':'今呃',
    '明儿':'明呃','明额':'明呃','名额':'明呃',
    '昨儿':'昨呃','昨额':'昨呃','做额':'昨呃',
    '早起':'早起头','造气':'早起头',
    '中上':'中上','钟上':'中上',
    '夜头':'夜头','椰头':'夜头',
    '眼下':'眼下','颜夏':'眼下',
    '老早':'老早','老子':'老早',
    '日日':'日日','热热':'日日',
    // 动词纠错
    '达':'汏','大':'汏','打':'汏',
    '着':'着','罩':'着','招':'着',
    '忙':'望','芒':'望','王':'望',
    '琴':'寻','勤':'寻','金':'寻',
    '刚':'讲','杠':'讲','港':'讲',
    '奔':'奔','本':'奔',
    '立':'立','力':'立','里':'立',
    '冠':'掼','灌':'掼','惯':'掼',
    '胆':'担','弹':'担',
    '格':'搁','哥':'搁','割':'搁',
    '抗':'囥','炕':'囥',
    '耍':'耍','刷':'耍',
    // 否定词
    '府':'弗','福':'弗','夫':'弗',
};

// ===== 翻译引擎 =====
function translate(text) {
    text = text.trim();
    if (!text) return null;

    const isM2D = S.mode === 'm2d';
    const wordMap = isM2D ? M2D : D2M;

    let result = text;
    const entries = Object.entries(wordMap).sort((a, b) => b[0].length - a[0].length);
    for (const [from, to] of entries) {
        if (result.includes(from)) {
            result = result.split(from).join(to);
        }
    }

    if (isM2D) {
        result = result.replace(/呃{2,}/g, '呃');
        result = result.replace(/了吗/g, '呃没');
        result = result.replace(/了。/g, '呃。');
        result = result.replace(/了！/g, '呃！');
        result = result.replace(/了？/g, '呃？');
    }

    const changed = result !== text;
    return { original: text, translated: result, confidence: changed ? 'high' : 'low', source: changed ? '规则引擎' : '未匹配' };
}

// ===== TTS语音播报（修复：确保中文语音）=====
function initVoices() {
    if (!('speechSynthesis' in window)) return;

    function findChineseVoice() {
        const voices = speechSynthesis.getVoices();
        // 优先找zh-CN，然后zh，然后任何中文
        let best = null;
        for (const v of voices) {
            if (v.lang === 'zh-CN') { best = v; break; }
            if (!best && v.lang.startsWith('zh')) best = v;
            if (!best && (v.lang.includes('Chinese') || v.lang.includes('chinese'))) best = v;
        }
        return best;
    }

    // voices可能异步加载
    speechSynthesis.onvoiceschanged = () => {
        S.chineseVoice = findChineseVoice();
        console.log('中文语音已加载:', S.chineseVoice ? S.chineseVoice.name : '未找到');
    };

    // 也尝试同步获取
    S.chineseVoice = findChineseVoice();
}

function speakText(text) {
    if (!text || !('speechSynthesis' in window)) return;

    // 重要：先取消之前的播报
    speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';  // 强制中文
    u.rate = 0.85;
    u.pitch = 1.0;
    u.volume = 1.0;

    // 选择中文语音（关键修复！）
    if (S.chineseVoice) {
        u.voice = S.chineseVoice;
    }

    // 如果语音还没加载，等一下再试
    u.onstart = () => {
        setStatus('🔊 播报中...');
    };
    u.onend = () => {
        setStatus('播报完成');
    };
    u.onerror = (e) => {
        console.error('TTS错误:', e);
        // 降级：不选voice再试
        if (u.voice) {
            const u2 = new SpeechSynthesisUtterance(text);
            u2.lang = 'zh-CN';
            u2.rate = 0.85;
            speechSynthesis.speak(u2);
        }
    };

    speechSynthesis.speak(u);
}

// ===== 语音识别（修复：即时翻译+方言纠错）=====
function initSpeech() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        setStatus('⚠️ 浏览器不支持语音，请用Chrome');
        return;
    }

    S.recognition = new SR();
    S.recognition.continuous = false;
    S.recognition.interimResults = true;
    S.recognition.lang = 'zh-CN';
    S.recognition.maxAlternatives = 5;  // 获取5个候选，提高纠错率

    S.recognition.onstart = () => {
        S.isRecording = true;
        document.getElementById('voiceBtn').classList.add('recording');
        document.getElementById('voiceBtn').textContent = '⏹';
        setStatus('🎙️ 正在听，请说话...');
    };

    S.recognition.onresult = (e) => {
        // 收集所有候选结果并做方言纠错
        let bestText = '';
        let bestScore = -1;

        for (let i = e.resultIndex; i < e.results.length; i++) {
            for (let j = 0; j < e.results[i].length; j++) {
                let text = e.results[i][j].transcript.trim();
                const conf = e.results[i][j].confidence || 0.5;

                // 方言纠错
                let corrected = text;
                let fixCount = 0;
                for (const [wrong, right] of Object.entries(SPEECH_FIX)) {
                    if (corrected.includes(wrong)) {
                        corrected = corrected.replace(new RegExp(wrong, 'g'), right);
                        fixCount++;
                    }
                }

                // 纠错越多，说明越可能是方言，给更高分
                const score = conf + fixCount * 0.15;
                if (score > bestScore) {
                    bestText = corrected;
                    bestScore = score;
                }
            }
        }

        if (bestText) {
            document.getElementById('inputBox').value = bestText;
            setStatus('识别到: ' + bestText);
        }

        // 关键修复：最终结果时立即翻译
        if (e.results[e.results.length - 1].isFinal) {
            stopVoice();
            if (bestText) {
                setStatus('翻译中...');
                // 用setTimeout确保UI更新
                setTimeout(() => doTranslate(), 50);
            }
        }
    };

    S.recognition.onerror = (e) => {
        stopVoice();
        if (e.error === 'not-allowed') {
            setStatus('❌ 麦克风被拒绝，请点击地址栏🔒允许');
            showToast('请在浏览器地址栏点击🔒→允许麦克风');
        } else if (e.error === 'no-speech') {
            setStatus('未检测到语音，请重试');
        } else if (e.error !== 'aborted') {
            setStatus('语音错误: ' + e.error);
        }
    };

    S.recognition.onend = () => {
        stopVoice();
    };
}

function toggleVoice() {
    if (S.isRecording) {
        stopVoice();
        return;
    }
    if (!S.recognition) initSpeech();
    if (!S.recognition) {
        showToast('请使用Chrome浏览器');
        return;
    }
    try {
        S.recognition.start();
    } catch(e) {
        if (e.name !== 'InvalidStateError') showToast('语音启动失败');
    }
}

function stopVoice() {
    S.isRecording = false;
    const btn = document.getElementById('voiceBtn');
    btn.classList.remove('recording');
    btn.textContent = '🎤';
    if (S.recognition) try { S.recognition.stop(); } catch(e) {}
}

function setStatus(text) {
    document.getElementById('statusText').textContent = text;
}

// ===== UI =====
function setMode(mode) {
    S.mode = mode;
    document.getElementById('modeM2D').classList.toggle('active', mode === 'm2d');
    document.getElementById('modeD2M').classList.toggle('active', mode === 'd2m');
    document.getElementById('inputBox').placeholder = mode === 'm2d'
        ? '输入普通话，如：你去哪里？\n点🎤语音输入'
        : '输入东台话，如：你上哪块去呃？';
    document.getElementById('inputBox').value = '';
    document.getElementById('resultArea').innerHTML = '';
    document.getElementById('hintBox').innerHTML = mode === 'm2d'
        ? '💡 点<b>🎤</b>说<b>普通话</b>→自动翻译为东台话+朗读'
        : '💡 东台话建议<b>文字输入</b>。语音说方言会自动纠错，但可能不准。';
    initQuick();
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-translate').classList.toggle('hidden', tab !== 'translate');
    document.getElementById('tab-dict').classList.toggle('hidden', tab !== 'dict');
    document.getElementById('tab-history').classList.toggle('hidden', tab !== 'history');
    if (tab === 'dict') renderDict();
    if (tab === 'history') renderHistory();
}

let timer = null;
function onInput() {
    clearTimeout(timer);
    timer = setTimeout(() => {
        const text = document.getElementById('inputBox').value.trim();
        if (text.length >= 2) doTranslate();
    }, 300);
}

function doTranslate() {
    const text = document.getElementById('inputBox').value.trim();
    if (!text) return;

    const r = translate(text);
    if (!r) return;

    const confClass = r.confidence === 'high' ? 'high' : 'low';
    const confLabel = r.confidence === 'high' ? '✅ 翻译完成' : '⚠️ 仅供参考';

    document.getElementById('resultArea').innerHTML = `
        <div class="result-box">
            <div class="result-label">${S.mode === 'm2d' ? '普通话' : '东台话'}</div>
            <div class="result-text">${esc(r.original)}</div>
            <div class="result-label" style="margin-top:8px">${S.mode === 'm2d' ? '🗣️ 东台话' : '🇨🇳 普通话'}</div>
            <div class="result-dialect">${esc(r.translated)}</div>
            <div class="result-meta">
                <span class="meta-tag">${r.source}</span>
                <span class="confidence ${confClass}">${confLabel}</span>
            </div>
            <div class="result-actions">
                <button class="action-btn primary" onclick="speakText('${esc(r.translated)}')">🔊 朗读${S.mode === 'm2d' ? '东台话' : '普通话'}</button>
                <button class="action-btn secondary" onclick="speakText('${esc(r.original)}')">🔊 原文</button>
                <button class="action-btn secondary" onclick="copyResult('${esc(r.translated)}')">📋</button>
            </div>
        </div>`;

    // 自动朗读翻译结果
    speakText(r.translated);

    // 历史
    S.history.unshift({ time: new Date().toLocaleString('zh-CN'), original: r.original, translated: r.translated, mode: S.mode });
    if (S.history.length > 50) S.history.length = 50;
    localStorage.setItem('dt_h', JSON.stringify(S.history));
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function copyResult(t) {
    navigator.clipboard.writeText(t).then(() => {
        showToast('已复制: ' + t);
    }).catch(() => {
        // 降级方案
        const ta = document.createElement('textarea');
        ta.value = t; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制');
    });
}

// ===== 快捷短语 =====
const QUICK_M2D = ["你好","吃饭了吗","你去哪里","今天吃什么","多少钱","太贵了","便宜点","回家了","不知道","很厉害"];
const QUICK_D2M = ["你好呃","饭吃呃没","你上哪块去呃","今呃吃什的呃","几钿呃","蛮贵呃","便宜点呃","家去呃","弗晓得","蛮来斯呃"];
function initQuick() {
    const phrases = S.mode === 'm2d' ? QUICK_M2D : QUICK_D2M;
    document.getElementById('quickGrid').innerHTML = phrases.map(p =>
        `<button class="quick-chip" onclick="useQuick('${p}')">${p}</button>`).join('');
}
function useQuick(t) { document.getElementById('inputBox').value = t; doTranslate(); }

// ===== 方言词典 =====
const DICT = [
    {c:'否定',items:[['弗','不'],['呒得','没有'],['覅','不要']]},
    {c:'疑问',items:[['哪块','哪里'],['什的','什么'],['怎呃','怎么'],['几钿','多少钱'],['什的时辰','什么时候']]},
    {c:'特色',items:[['杲昃','东西'],['来斯','厉害'],['推板','差'],['扎实','实在'],['刷刮','利索'],['适意','舒服'],['心焦','着急']]},
    {c:'称谓',items:[['爹爹','爷爷'],['伢儿','孩子'],['女将','妻子'],['男将','丈夫'],['先生','老师'],['邻舍','邻居']]},
    {c:'代词',items:[['我俦','我们'],['你俦','你们'],['他俦','他们']]},
    {c:'时间',items:[['今呃','今天'],['明呃','明天'],['昨呃','昨天'],['早起头','早上'],['中上','中午'],['夜头','晚上'],['眼下','现在'],['日日','每天']]},
    {c:'动词',items:[['汏','洗'],['着','穿'],['望','看'],['寻','找'],['讲','说'],['奔','跑'],['立','站'],['困觉','睡觉'],['家去','回家'],['讲白相','聊天']]},
    {c:'形容词',items:[['蛮','很'],['灵光','聪明'],['木作','笨'],['标致','漂亮'],['清爽','干净'],['龌龊','脏']]},
];
function renderDict() {
    document.getElementById('dictContent').innerHTML = DICT.map(g => `
        <div class="dict-section"><div class="dict-title">${g.c}</div>
        <table class="dict-table">${g.items.map(([d,m]) => `<tr><td>${d}</td><td>${m}</td></tr>`).join('')}</table></div>`).join('');
}

// ===== 历史 =====
function renderHistory() {
    const el = document.getElementById('historyList');
    if (!S.history.length) { el.innerHTML = '<p style="color:#999;text-align:center;padding:20px">暂无历史</p>'; return; }
    el.innerHTML = S.history.map(h => `
        <div class="history-item">
            <div class="history-time">${h.time}</div>
            <div class="history-pair">${h.original} <span class="arrow">→</span> ${h.translated}</div>
        </div>`).join('');
}

function showToast(msg) {
    const old = document.querySelector('.toast'); if (old) old.remove();
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

// ===== 初始化 =====
document.addEventListener('DOMContentLoaded', () => {
    initQuick();
    initVoices();  // 先加载语音
    initSpeech();  // 初始化语音识别
    setStatus('✅ 准备就绪，点击🎤说话或输入文字');
});
</script>
